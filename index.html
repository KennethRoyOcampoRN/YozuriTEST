<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yozuri Philippines Project - Clinical Health Optimization Program</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        :root {
            --apple-bg: #f2f2f7;
            --apple-card: #ffffff;
            --apple-blue: #007aff;
            --apple-text: #1c1c1e;
            --apple-gray: #8e8e93;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            -webkit-font-smoothing: antialiased;
        }
        /* --- iOS Intro Animations --- */
        @keyframes iosScaleIn {
            0% { opacity: 0; transform: scale(0.95) translateY(15px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-ios-intro {
            animation: iosScaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-ios-buttons {
            animation: iosScaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
            opacity: 0; /* Starts hidden until delay finishes */
        }
        
        .ios-card {
            background-color: var(--apple-card);
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            overflow: hidden;
        }
        .ios-input {
            width: 100%;
            padding: 16px;
            background: var(--apple-card);
            border: 1px solid #e5e5ea;
            border-radius: 14px;
            font-size: 17px;
            transition: border-color 0.2s;
            appearance: none;
            text-transform: uppercase;
        }
        .ios-input:focus {
            outline: none;
            border-color: var(--apple-blue);
        }
        .ios-button {
            background-color: var(--apple-blue);
            color: white;
            border-radius: 14px;
            padding: 16px 20px;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            transition: opacity 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
        }
        .ios-button:active { opacity: 0.7; }
        .ios-button:disabled { background-color: #a1c8ff; cursor: not-allowed; }
        .option-card { border: 2px solid transparent; transition: all 0.2s ease; }
        .option-card.selected { border-color: var(--apple-blue); background-color: #f0f8ff; }
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        .print-only { display: none; }

        /* STRICT 1-PAGE MEDICAL FILE PRINT CONFIGURATION */
        @page {
            size: A4 portrait;
            margin: 0.5cm;
        }
        @media print, .pdf-mode {
            body, .pdf-mode { 
                background: white !important; 
                font-size: 9pt !important; 
                color: black !important;
                line-height: 1.2 !important;
            }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            
            #dashboard-content { space-y: 0 !important; display: flex; flex-direction: column; gap: 6px !important; height: 100%; max-height: 290mm; overflow: hidden; }
            .pb-20 { padding-bottom: 0 !important; }
            .ios-card { 
                box-shadow: none !important; 
                border: 1px solid #ddd !important; 
                border-radius: 4px !important;
                padding: 6px 10px !important;
                margin-bottom: 0 !important;
                break-inside: avoid;
            }
            .glass-nav { display: none !important; }
            
            h2, h3, h4 { color: black !important; margin-bottom: 2px !important; }
            h3 { font-size: 10pt !important; border-bottom: 1px solid #eee; padding-bottom: 2px; }
            h4 { font-size: 9pt !important; font-weight: bold !important; }
            .text-sm { font-size: 8.5pt !important; }
            .text-xs { font-size: 7.5pt !important; }
            
            .print-medical-header {
                border: 2px solid black !important;
                padding: 10px !important;
                margin-bottom: 4px !important;
                position: relative !important;
            }
            .print-medical-header h1 {
                text-align: center !important;
                border-bottom: 2px solid black !important;
                padding-bottom: 4px !important;
                margin-bottom: 6px !important;
                font-size: 14pt !important;
                font-weight: bold !important;
                text-transform: uppercase !important;
            }
            .medical-grid {
                display: grid !important;
                grid-template-columns: 1fr 1fr !important;
                gap: 2px !important;
                font-size: 8.5pt !important;
                width: 100% !important;
            }
            .medical-grid span { font-weight: bold !important; }

            /* --- PROFESSIONAL PRINT STATS GRID --- */
            .professional-print-stats {
                display: grid !important;
                grid-template-columns: repeat(4, 1fr) !important;
                gap: 8px !important;
                margin-bottom: 8px !important;
            }
            .professional-print-stats .stat-box {
                border: 2px solid #000 !important;
                border-radius: 6px !important;
                padding: 8px 4px !important;
                text-align: center !important;
            }
            .professional-print-stats .stat-title {
                font-size: 8pt !important;
                font-weight: bold !important;
                text-transform: uppercase !important;
                color: #444 !important;
                margin-bottom: 2px !important;
            }
            .professional-print-stats .stat-value {
                font-size: 16pt !important; 
                font-weight: 900 !important;
                color: #000 !important;
                line-height: 1.1 !important;
            }
            .professional-print-stats .stat-value span { 
                font-size: 8pt !important; 
                font-weight: normal !important; 
                display: block !important; 
            }

            /* --- COMPACT PRINT MACROS --- */
            .professional-print-macros {
                display: grid !important;
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 8px !important;
                margin-bottom: 12px !important;
            }
            .professional-print-macros .macro-box {
                border: 1px solid #666 !important;
                border-radius: 4px !important;
                padding: 4px !important;
                text-align: center !important;
                background-color: transparent !important;
            }
            .professional-print-macros .macro-title { 
                font-size: 8pt !important; 
                font-weight: bold !important; 
                color: #555 !important; 
            }
            .professional-print-macros .macro-value { 
                font-size: 12pt !important; 
                font-weight: bold !important; 
                color: #000 !important; 
            }

            /* Compress Lists & Exercises */
            ul.space-y-4 { margin: 0 !important; padding-left: 14px !important; }
            ul.space-y-4 > li { margin-top: 2px !important; margin-bottom: 4px !important; padding: 0 !important; display: list-item !important; list-style-type: disc !important; }
            ul.space-y-4 > li > div.w-2 { display: none !important; } 
            
            /* Flatten grid for exercises */
            .exercise-grid { grid-template-columns: repeat(4, 1fr) !important; gap: 4px !important; }
            .exercise-grid > div { padding: 4px !important; border: none !important; }
            .exercise-grid img { height: 60px !important; margin-bottom: 2px !important;}
            .iwt-block { display: flex !important; flex-direction: row !important; padding: 0 !important; gap: 10px !important; border: none !important; background: transparent !important; align-items: center !important;}
            .iwt-block img { height: 40px !important; width: 40px !important;}
        }
        
        .pdf-mode .print-only { display: block !important; }
        .pdf-mode .no-print { display: none !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ==========================================
        // APP IMAGES DICTIONARY
        // Pointing directly to your local file uploads.
        // Keep these images in the same folder as the index.html file!
        // ==========================================
        const appImages = {
            // Activity Levels (Currently using web links - Upload 5 local photos to replace these!)
            sedentary: 'https://images.unsplash.com/photo-1499951360447-b19be8fe80f5?auto=format&fit=crop&w=200&q=80',
            lightlyActive: 'https://images.unsplash.com/photo-1536922246289-88c42f957773?auto=format&fit=crop&w=200&q=80',
            moderatelyActive: 'https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?auto=format&fit=crop&w=200&q=80',
            veryActive: 'https://images.unsplash.com/photo-1558611848-73f7eb4001a1?auto=format&fit=crop&w=200&q=80',
            extraActive: 'https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?auto=format&fit=crop&w=200&q=80',
            
            // Interval Walking & Cardio
            intervalWalking: './interval_walking.jpeg',
            joggingVsRunning: './jogging_vs_running.jpeg',
            skaters: './skaters.jpeg',
            
            // Exercises (Bodyweight / Weight Loss / Maintenance)
            squatBW: './air_squat.jpeg',
            jumpSquat: './jump_squat.jpeg',
            pushupBW: './standard_pushup.jpeg',
            pushupKnee: './knee_pushup.jpeg',
            pushupWall: './wall_pushup.jpeg',
            pushupIncline: './incline_pushup.jpeg',
            pushupDiamond: './diamond_pushup.jpeg',
            rowBW: './doorway_row.jpeg',
            lungeBW: './walking_lunge.jpeg',
            stepUp: './step_ups.jpeg',
            accessoryBW: './glute_bridge.jpeg',
            singleLegBridge: './single_leg_bridge.jpeg',
            assistedSquat: './assisted_squat.jpeg',
            assistedLunge: './assisted_lunge.jpeg',
            burpees: './burpees.jpeg',
            lateralLunge: './lateral_lunge.jpeg',
            mountainClimbers: './mountain_climbers.jpeg',
            plankVariations: './plank_variations.jpeg',
            plankReachUnder: './plank_reach_under.jpeg',
            tricepDips: './tricep_dips.jpeg',
            
            // Exercises (Bulking/Weighted/Advanced)
            squatHeavy: './bulgarian_split_squat.jpeg',
            backpackLunge: './backpack_lunge.jpeg',
            backpackSquat: './backpack_squat.jpeg',
            gobletSquat: './goblet_squat.jpeg',
            pushupDecline: './decline_pushup.jpeg',
            backpackPushup: './backpack_pushup.jpeg',
            rowTable: './table_row.jpeg',
            rowJug: './jug_row.jpeg',
            pullup: './pullup.jpeg',
            suitcaseDeadlift: './suitcase_deadlift.jpeg',
            towelDeadlift: './towel_deadlift.jpeg',
            pistolSquat: './pistol_squat.jpeg',
            bicepCurls: './bicep_curls.jpeg',
            accessoryHeavy: './towel_hamstring_curl.jpeg'
        };
        // ==========================================

        const foodDatabase = {
            // General & Traditional Foods
            "White Rice, Cooked (1 Cup)": { baseAmount: 1, unit: 'cup', carbs: 45, protein: 4.3, fat: 0.4, cals: 205 },
            "White Rice, Cooked (Grams)": { baseAmount: 100, unit: 'g', carbs: 28, protein: 2.7, fat: 0.3, cals: 130 },
            "Brown Rice, Cooked (1 Cup)": { baseAmount: 1, unit: 'cup', carbs: 52, protein: 5.5, fat: 1.8, cals: 248 },
            "Chicken Breast, Cooked (Grams)": { baseAmount: 100, unit: 'g', carbs: 0, protein: 31, fat: 3.6, cals: 165 },
            "Pork Adobo (1 Cup)": { baseAmount: 1, unit: 'cup', carbs: 10, protein: 28, fat: 36, cals: 490 },
            "Chicken Adobo (1 Cup)": { baseAmount: 1, unit: 'cup', carbs: 9, protein: 26, fat: 22, cals: 345 },
            "Pork Sinigang (1 Cup)": { baseAmount: 1, unit: 'cup', carbs: 8, protein: 20, fat: 15, cals: 250 },
            "Lechon Kawali (100g)": { baseAmount: 100, unit: 'g', carbs: 0, protein: 16, fat: 35, cals: 390 },
            "Egg, Boiled (Large)": { baseAmount: 1, unit: 'pc', carbs: 0.6, protein: 6.3, fat: 5.3, cals: 77 },
            "Bangus, Fried (Grams)": { baseAmount: 100, unit: 'g', carbs: 0, protein: 20, fat: 11, cals: 180 },
            "Kangkong (1 Cup)": { baseAmount: 1, unit: 'cup', carbs: 3.1, protein: 2.6, fat: 0.2, cals: 19 },
            "Mongo Soup (1 Cup)": { baseAmount: 1, unit: 'cup', carbs: 25, protein: 9, fat: 1, cals: 145 },
            "Pandesal (1 Piece)": { baseAmount: 1, unit: 'pc', carbs: 17, protein: 2.5, fat: 1, cals: 85 },
            "Taho (1 Cup)": { baseAmount: 1, unit: 'cup', carbs: 35, protein: 6, fat: 2, cals: 180 },
            
            // MyFitnessPal / Fast Food / Commercial Extraction Data
            "Jollibee Chickenjoy (1 pc)": { baseAmount: 1, unit: 'pc', carbs: 15, protein: 18, fat: 21, cals: 320 },
            "Jollibee Jolly Spaghetti": { baseAmount: 1, unit: 'pc', carbs: 50, protein: 12, fat: 9, cals: 330 },
            "Mang Inasal PM1 Pecho": { baseAmount: 1, unit: 'pc', carbs: 10, protein: 55, fat: 30, cals: 530 },
            "McDonald's Cheeseburger": { baseAmount: 1, unit: 'pc', carbs: 33, protein: 15, fat: 12, cals: 300 },
            "McDonald's French Fries (Medium)": { baseAmount: 1, unit: 'pc', carbs: 43, protein: 4, fat: 15, cals: 320 },
            "Chowking Pork Chao Fan": { baseAmount: 1, unit: 'pc', carbs: 70, protein: 15, fat: 20, cals: 520 },
            "Lucky Me! Pancit Canton (1 pack)": { baseAmount: 1, unit: 'pc', carbs: 42, protein: 8, fat: 16, cals: 350 },
            "Piattos Sour Cream (85g bag)": { baseAmount: 1, unit: 'pc', carbs: 50, protein: 4, fat: 26, cals: 450 },
            "SkyFlakes Crackers (1 pack/25g)": { baseAmount: 1, unit: 'pc', carbs: 17, protein: 2, fat: 5, cals: 120 },
            "San Marino Corned Tuna (180g can)": { baseAmount: 1, unit: 'pc', carbs: 2, protein: 26, fat: 14, cals: 240 },
            "C2 Green Tea Apple (350ml)": { baseAmount: 1, unit: 'pc', carbs: 35, protein: 0, fat: 0, cals: 140 }
        };

        const App = () => {
            const [step, setStep] = useState(0); // App starts at Intro
            const [canProceed, setCanProceed] = useState(false);
            const [profile, setProfile] = useState({
                firstName: '', lastName: '', age: '', gender: 'Male', weight: '', height: '', activityLevel: '1.2', goal: '', conditions: []
            });
            const [foodLog, setFoodLog] = useState([]);
            const [newFood, setNewFood] = useState({ name: '', amount: 1, unit: 'cup', calories: 0, carbs: 0, protein: 0, fat: 0 });
            const [quickFood, setQuickFood] = useState({ name: '', calories: '' });
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
            const [isSavingImage, setIsSavingImage] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            
            const [quickTrackerActive, setQuickTrackerActive] = useState(false);
            const [quickTrackerCalories, setQuickTrackerCalories] = useState('');

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 60000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                // Disclaimer timer logic
                if (step === 0.5) {
                    setCanProceed(false);
                    const timer = setTimeout(() => setCanProceed(true), 3000); // Button appears after 3 seconds
                    return () => clearTimeout(timer);
                }
            }, [step]);

            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const timeOptions = { hour: '2-digit', minute: '2-digit' };
            const displayDateTime = `${currentTime.toLocaleDateString('en-US', dateOptions)} at ${currentTime.toLocaleTimeString('en-US', timeOptions)}`;

            const activityLevels = [
                { id: '1.2', label: 'Sedentary Lifestyle', desc: 'Little to no exercise, mostly sitting', img: appImages.sedentary },
                { id: '1.375', label: 'Lightly Active', desc: 'Light exercise or walking 1-3 days/week', img: appImages.lightlyActive },
                { id: '1.55', label: 'Moderately Active', desc: 'Moderate exercise or sports 3-5 days/week', img: appImages.moderatelyActive },
                { id: '1.725', label: 'Very Active', desc: 'Hard exercise or sports 6-7 days/week', img: appImages.veryActive },
                { id: '1.9', label: 'Extra Active', desc: 'Very physical job or 2x daily intense training', img: appImages.extraActive }
            ];

            const goals = [
                { id: 'aggressive_loss', label: 'Aggressive Weight Loss', desc: 'Maximized caloric deficit', modifier: -750 },
                { id: 'loss', label: 'Weight Loss', desc: 'Sustainable, steady fat reduction', modifier: -500 },
                { id: 'maintenance', label: 'Maintenance / Better Form', desc: 'Body recomposition', modifier: 0 },
                { id: 'gain', label: 'Weight Gain (Lean Bulk)', desc: 'Controlled surplus', modifier: 250 },
                { id: 'aggressive_gain', label: 'Aggressive Weight Gain', desc: 'Maximized surplus', modifier: 500 }
            ];

            const conditionsList = [
                { id: 'asthma', label: 'Asthmatic', emoji: '🫁' },
                { id: 'htn', label: 'Hypertensive', emoji: '🩸' },
                { id: 'dm', label: 'Diabetic (Type 2)', emoji: '💧' },
                { id: 'heart', label: 'Heart Problem', emoji: '❤️' },
                { id: 'pcos', label: 'PCOS', emoji: '🌸' },
                { id: 'cholesterol', label: 'High Blood Cholesterol', emoji: '🧈' },
                { id: 'uric', label: 'High Uric Acid (Gout)', emoji: '🦶' }
            ];

            const stats = useMemo(() => {
                if (quickTrackerActive) {
                    const target = parseInt(quickTrackerCalories) || 2000;
                    return {
                        bmi: 'N/A', bmiCategory: 'N/A', bmr: 0, tdee: 0,
                        targetCalories: target,
                        macros: {
                            carbs: Math.round((target * 0.50) / 4),
                            protein: Math.round((target * 0.25) / 4),
                            fat: Math.round((target * 0.25) / 9)
                        }
                    };
                }

                if (!profile.weight || !profile.height || !profile.age || !profile.goal) return null;
                const w = parseFloat(profile.weight);
                const h = parseFloat(profile.height);
                const a = parseInt(profile.age);
                
                const bmi = w / Math.pow(h / 100, 2);
                
                let bmr = (10 * w) + (6.25 * h) - (5 * a);
                bmr += profile.gender === 'Male' ? 5 : -161;

                const tdee = bmr * parseFloat(profile.activityLevel);
                const selectedGoal = goals.find(g => g.id === profile.goal);
                let targetCalories = tdee + (selectedGoal ? selectedGoal.modifier : 0);

                if (profile.gender === 'Female' && targetCalories < 1200) targetCalories = 1200;
                if (profile.gender === 'Male' && targetCalories < 1500) targetCalories = 1500;

                const isDiabeticOrPcos = profile.conditions.includes('dm') || profile.conditions.includes('pcos');
                const isKeto = profile.conditions.includes('dm') && selectedGoal.id === 'aggressive_loss';
                
                let carbPct, proPct, fatPct;
                if (isKeto) { carbPct = 0.10; proPct = 0.25; fatPct = 0.65; } 
                else if (isDiabeticOrPcos) { carbPct = 0.30; proPct = 0.35; fatPct = 0.35; } 
                else { carbPct = 0.45; proPct = 0.25; fatPct = 0.30; }

                return {
                    bmi: bmi.toFixed(1),
                    bmiCategory: bmi < 18.5 ? 'Underweight' : bmi < 25 ? 'Normal' : bmi < 30 ? 'Overweight' : 'Obese',
                    bmr: Math.round(bmr),
                    tdee: Math.round(tdee),
                    targetCalories: Math.round(targetCalories),
                    macros: {
                        carbs: Math.round((targetCalories * carbPct) / 4),
                        protein: Math.round((targetCalories * proPct) / 4),
                        fat: Math.round((targetCalories * fatPct) / 9)
                    }
                };
            }, [profile, quickTrackerActive, quickTrackerCalories]);

            const recalculateFromDb = (name, amount, unitFallback) => {
                const food = foodDatabase[name];
                if(food) {
                    const ratio = parseFloat(amount || 0) / food.baseAmount;
                    setNewFood({
                        name: name, amount: amount, unit: food.unit, 
                        carbs: (food.carbs * ratio).toFixed(1),
                        protein: (food.protein * ratio).toFixed(1),
                        fat: (food.fat * ratio).toFixed(1),
                        calories: Math.round(food.cals * ratio)
                    });
                } else {
                    setNewFood({
                        name: name, amount: amount, unit: unitFallback,
                        carbs: 0, protein: 0, fat: 0, calories: 0
                    });
                }
            };

            const logDatabaseFood = () => {
                if(newFood.name && newFood.calories > 0) {
                    setFoodLog([...foodLog, { 
                        ...newFood, 
                        id: Date.now(),
                        desc: `${newFood.amount}${newFood.unit}`
                    }]);
                    setNewFood({ name: '', amount: 1, unit: 'cup', calories: 0, carbs: 0, protein: 0, fat: 0 });
                }
            };

            const logQuickFood = () => {
                if(quickFood.name && quickFood.calories) {
                    setFoodLog([...foodLog, { 
                        name: quickFood.name, 
                        calories: quickFood.calories,
                        carbs: 0, protein: 0, fat: 0,
                        id: Date.now(),
                        desc: 'Quick Add'
                    }]);
                    setQuickFood({ name: '', calories: '' });
                }
            };

            const removeFood = (id) => setFoodLog(foodLog.filter(f => f.id !== id));

            const consumed = foodLog.reduce((acc, curr) => ({
                cals: acc.cals + Number(curr.calories || 0),
                carbs: acc.carbs + Number(curr.carbs || 0),
                protein: acc.protein + Number(curr.protein || 0),
                fat: acc.fat + Number(curr.fat || 0)
            }), { cals: 0, carbs: 0, protein: 0, fat: 0 });

            const handleSavePDF = async () => {
                setIsGeneratingPDF(true);
                const element = document.getElementById('dashboard-content');
                document.body.classList.add('pdf-mode');
                
                const opt = {
                    margin:       0.2, 
                    filename:     `CHOP_Report_${profile.firstName}_${profile.lastName}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true },
                    jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
                };

                setTimeout(async () => {
                    await html2pdf().set(opt).from(element).save();
                    document.body.classList.remove('pdf-mode');
                    setIsGeneratingPDF(false);
                }, 100);
            };

            const handleSaveExerciseImage = async () => {
                setIsSavingImage(true);
                const element = document.getElementById('exercise-plan-container');
                if (element) {
                    const btn = document.getElementById('save-img-btn');
                    if (btn) btn.style.display = 'none'; // Temporarily hide the button from the image
                    
                    try {
                        const canvas = await window.html2canvas(element, { 
                            scale: 2, 
                            useCORS: true,
                            backgroundColor: '#ffffff'
                        });
                        const link = document.createElement('a');
                        link.download = `Exercise_Plan_${profile.firstName || 'Patient'}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    } catch (err) {
                        console.error("Failed to save image", err);
                    }
                    
                    if (btn) btn.style.display = 'flex'; // Restore button
                }
                setIsSavingImage(false);
            };

            const startQuickTracker = () => {
                if (quickTrackerCalories && quickTrackerCalories > 0) {
                    setQuickTrackerActive(true);
                    setStep(4);
                }
            };

            const renderIntro = () => (

                                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>

                        <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight text-gray-900 mb-3 leading-tight">

                            Clinical Health Optimization Program
                        </h2>
                        <p className="text-sm font-semibold text-[#007aff] mt-4 tracking-wider uppercase">
                            By Kenneth Roy Ocampo, RN 2026

                        <button 
                            onClick={() => setStep(0.5)}

                            <i className="lucide-chevron-right w-5 h-5 opacity-70"></i>

                        <button 
                            onClick={() => setStep(5)}

                            <span>Quick Calorie Tracker</span>
                            <i className="lucide-zap w-5 h-5 opacity-70"></i>
                        </button>
                    </div>
                </div>
            );

            const renderDisclaimer = () => (
                <div className="max-w-md mx-auto space-y-6 animate-ios-intro mt-12 text-center px-4">
                    <div className="w-24 h-24 bg-red-100 text-red-600 rounded-full mx-auto flex items-center justify-center mb-6 shadow-sm border border-red-200">
                        {/* Custom Medical Warning Icon */}
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-12 h-12">
                            <path d="M7.86 2h8.28L22 7.86v8.28L16.14 22H7.86L2 16.14V7.86L7.86 2z"></path>
                            <path d="M12 8v4"></path>
                            <path d="M12 16h.01"></path>
                        </svg>
                    </div>
                    <h2 className="text-3xl font-bold text-gray-900">Medical Disclaimer</h2>
                    <div className="bg-white p-6 rounded-2xl border border-red-100 shadow-sm text-left">
                        <p className="text-gray-700 leading-relaxed font-medium">
                            Before beginning this or any exercise and nutrition program, it is highly recommended that you seek medical advice from your company nurse or a qualified doctor.
                        </p>
                        <p className="text-gray-500 text-sm leading-relaxed mt-4">
                            By proceeding, you acknowledge that you have consulted a healthcare professional or are participating at your own risk.
                        </p>
                    </div>
                    <div className="h-20 flex items-center justify-center mt-8">
                        {canProceed ? (
                            <button 
                                onClick={() => setStep(1)} 
                                className="ios-button animate-ios-intro w-full shadow-lg">
                                Proceed to Assessment
                            </button>
                        ) : (
                            <p className="text-sm text-red-400 font-medium animate-pulse">Please read the disclaimer carefully...</p>
                        )}
                    </div>
                </div>
            );

            const renderHeader = () => (
                <div className="glass-nav sticky top-0 z-50 px-6 py-4 mb-6">
                    <div className="max-w-2xl mx-auto flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            {/* Stylish iOS Style Back Buttons */}
                            {step === 0.5 && (
                                <button onClick={() => setStep(0)} className="flex items-center gap-1 text-[#007aff] bg-[#007aff]/10 hover:bg-[#007aff]/20 active:scale-95 px-3 py-1.5 rounded-full font-semibold transition-all no-print shadow-sm">
                                    <i className="lucide-chevron-left w-5 h-5 -ml-1"></i> Back
                                </button>
                            )}
                            {step === 1 && (
                                <button onClick={() => setStep(0)} className="flex items-center gap-1 text-[#007aff] bg-[#007aff]/10 hover:bg-[#007aff]/20 active:scale-95 px-3 py-1.5 rounded-full font-semibold transition-all no-print shadow-sm">
                                    <i className="lucide-chevron-left w-5 h-5 -ml-1"></i> Back
                                </button>
                            )}
                            {step > 1 && step < 4 && !quickTrackerActive && (
                                <button onClick={() => setStep(step - 1)} className="flex items-center gap-1 text-[#007aff] bg-[#007aff]/10 hover:bg-[#007aff]/20 active:scale-95 px-3 py-1.5 rounded-full font-semibold transition-all no-print shadow-sm">
                                    <i className="lucide-chevron-left w-5 h-5 -ml-1"></i> Back
                                </button>
                            )}
                            {step === 5 && (
                                <button onClick={() => setStep(0)} className="flex items-center gap-1 text-[#007aff] bg-[#007aff]/10 hover:bg-[#007aff]/20 active:scale-95 px-3 py-1.5 rounded-full font-semibold transition-all no-print shadow-sm">
                                    <i className="lucide-chevron-left w-5 h-5 -ml-1"></i> Back
                                </button>
                            )}
                            {step === 4 && quickTrackerActive && (
                                <button onClick={() => { setQuickTrackerActive(false); setStep(5); }} className="flex items-center gap-1 text-[#007aff] bg-[#007aff]/10 hover:bg-[#007aff]/20 active:scale-95 px-3 py-1.5 rounded-full font-semibold transition-all no-print shadow-sm">
                                    <i className="lucide-chevron-left w-5 h-5 -ml-1"></i> Back
                                </button>
                            )}
                            {step === 4 && !quickTrackerActive && (
                                <button onClick={() => setStep(3)} className="flex items-center gap-1 text-[#007aff] bg-[#007aff]/10 hover:bg-[#007aff]/20 active:scale-95 px-3 py-1.5 rounded-full font-semibold transition-all no-print shadow-sm">
                                    <i className="lucide-chevron-left w-5 h-5 -ml-1"></i> Back

                                    <p className="text-[10px] text-gray-400 mt-0.5">{displayDateTime}</p>
                                </div>
                            )}
                        </div>
                        
                        {step === 4 && !quickTrackerActive && (
