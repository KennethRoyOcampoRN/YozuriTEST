            [appImages.bicepCurls]: "Hold weights or water jugs. Keep your elbows pinned to your sides and curl the weight up to your shoulders. Squeeze hard at the top.",
            [appImages.accessoryHeavy]: "Lie on your back with heels on a sliding towel (smooth floor). Bridge up, slide heels away from you, then forcefully pull them back in using your hamstrings."
        };

        const App = () => {
            const [step, setStep] = useState(0); // App starts at Intro
            const [canProceed, setCanProceed] = useState(false);
            const [profile, setProfile] = useState({
                firstName: '', lastName: '', age: '', gender: 'Male', weight: '', height: '', activityLevel: '1.2', goal: '', conditions: []
            });
            const [foodLog, setFoodLog] = useState([]);
            const [newFood, setNewFood] = useState({ name: '', amount: 1, unit: 'cup', calories: 0, carbs: 0, protein: 0, fat: 0 });
            const [quickFood, setQuickFood] = useState({ name: '', calories: '' });
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
            const [isSavingImage, setIsSavingImage] = useState(false);
            const [enlargedImage, setEnlargedImage] = useState(null); // Lightbox state
            const [warningPlayed, setWarningPlayed] = useState(false); // Sound state
            const [currentTime, setCurrentTime] = useState(new Date());
            
            const [quickTrackerActive, setQuickTrackerActive] = useState(false);
            const [quickTrackerCalories, setQuickTrackerCalories] = useState('');
            
            const [foodSearchTerm, setFoodSearchTerm] = useState('');
            const [showDropdown, setShowDropdown] = useState(false);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 60000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                // Disclaimer timer logic for both Medical and Exercise disclaimers
                if (step === 0.5 || step === 6) {
                    setCanProceed(false);
                    const timer = setTimeout(() => setCanProceed(true), 3000); // Button appears after 3 seconds
                    return () => clearTimeout(timer);
                }
            }, [step]);

            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const timeOptions = { hour: '2-digit', minute: '2-digit' };
            const displayDateTime = `${currentTime.toLocaleDateString('en-US', dateOptions)} at ${currentTime.toLocaleTimeString('en-US', timeOptions)}`;

            const activityLevels = [
                { id: '1.2', label: 'Sedentary Lifestyle', desc: 'Little to no exercise, mostly sitting', img: appImages.sedentary },
                { id: '1.375', label: 'Lightly Active', desc: 'Light exercise or walking 1-3 days/week', img: appImages.lightlyActive },
                { id: '1.55', label: 'Moderately Active', desc: 'Moderate exercise or sports 3-5 days/week', img: appImages.moderatelyActive },
                { id: '1.725', label: 'Very Active', desc: 'Hard exercise or sports 6-7 days/week', img: appImages.veryActive },
                { id: '1.9', label: 'Extra Active', desc: 'Very physical job or 2x daily intense training', img: appImages.extraActive }
            ];

            const goals = [
                { id: 'aggressive_loss', label: 'Aggressive Weight Loss', desc: 'Maximized caloric deficit', modifier: -750 },
                { id: 'loss', label: 'Weight Loss', desc: 'Sustainable, steady fat reduction', modifier: -500 },
                { id: 'maintenance', label: 'Maintenance / Better Form', desc: 'Body recomposition', modifier: 0 },
                { id: 'gain', label: 'Weight Gain (Lean Bulk)', desc: 'Controlled surplus', modifier: 250 },
                { id: 'aggressive_gain', label: 'Aggressive Weight Gain', desc: 'Maximized surplus', modifier: 500 }
            ];

            const conditionsList = [
                { id: 'none', label: 'None / Generally Healthy', emoji: '✅' },
                { id: 'asthma', label: 'Asthmatic', emoji: '🫁' },
                { id: 'htn', label: 'Hypertensive', emoji: '🩸' },
                { id: 'dm', label: 'Diabetic (Type 2)', emoji: '💧' },
                { id: 'heart', label: 'Heart Problem', emoji: '❤️' },
                { id: 'pcos', label: 'PCOS', emoji: '🌸' },
                { id: 'cholesterol', label: 'High Blood Cholesterol', emoji: '🧈' },
                { id: 'uric', label: 'High Uric Acid (Gout)', emoji: '🦶' }
            ];

            const stats = useMemo(() => {
                if (quickTrackerActive) {
                    const target = parseInt(quickTrackerCalories) || 2000;
                    return {
                        bmi: 'N/A', bmiCategory: 'N/A', bmr: 0, tdee: 0,
                        targetCalories: target,
                        macros: {
                            carbs: Math.round((target * 0.50) / 4),
                            protein: Math.round((target * 0.25) / 4),
                            fat: Math.round((target * 0.25) / 9)
                        }
                    };
                }

                if (!profile.weight || !profile.height || !profile.age || !profile.goal) return null;
                const w = parseFloat(profile.weight);
                const h = parseFloat(profile.height);
                const a = parseInt(profile.age);
                
                const bmi = w / Math.pow(h / 100, 2);
                
                let bmr = (10 * w) + (6.25 * h) - (5 * a);
                bmr += profile.gender === 'Male' ? 5 : -161;

                const tdee = bmr * parseFloat(profile.activityLevel);
                const selectedGoal = goals.find(g => g.id === profile.goal);
                let targetCalories = tdee + (selectedGoal ? selectedGoal.modifier : 0);

                if (profile.gender === 'Female' && targetCalories < 1200) targetCalories = 1200;
                if (profile.gender === 'Male' && targetCalories < 1500) targetCalories = 1500;

                const isDiabeticOrPcos = profile.conditions.includes('dm') || profile.conditions.includes('pcos');
                const isKeto = profile.conditions.includes('dm') && selectedGoal.id === 'aggressive_loss';
                
                let carbPct, proPct, fatPct;
                if (isKeto) { carbPct = 0.10; proPct = 0.25; fatPct = 0.65; } 
                else if (isDiabeticOrPcos) { carbPct = 0.30; proPct = 0.35; fatPct = 0.35; } 
                else { carbPct = 0.45; proPct = 0.25; fatPct = 0.30; }

                return {
                    bmi: bmi.toFixed(1),
                    bmiCategory: bmi < 18.5 ? 'Underweight' : bmi < 25 ? 'Normal' : bmi < 30 ? 'Overweight' : 'Obese',
                    bmr: Math.round(bmr),
                    tdee: Math.round(tdee),
                    targetCalories: Math.round(targetCalories),
                    macros: {
                        carbs: Math.round((targetCalories * carbPct) / 4),
                        protein: Math.round((targetCalories * proPct) / 4),
                        fat: Math.round((targetCalories * fatPct) / 9)
                    }
                };
            }, [profile, quickTrackerActive, quickTrackerCalories]);

            const recalculateFromDb = (name, amount, unitFallback) => {
                const food = foodDatabase[name];
                if(food) {
                    const ratio = parseFloat(amount || 0) / food.baseAmount;
                    setNewFood({
                        name: name, amount: amount, unit: food.unit, 
                        carbs: (food.carbs * ratio).toFixed(1),
                        protein: (food.protein * ratio).toFixed(1),
                        fat: (food.fat * ratio).toFixed(1),
                        calories: Math.round(food.cals * ratio)
                    });
                } else {
                    setNewFood({
                        name: name, amount: amount, unit: unitFallback,
                        carbs: 0, protein: 0, fat: 0, calories: 0
                    });
                }
            };

            const handleSelectFood = (foodName) => {
                setFoodSearchTerm(foodName);
                setShowDropdown(false);
                const currentAmount = newFood.amount || 1;
                recalculateFromDb(foodName, currentAmount, foodDatabase[foodName].unit);
            };

            const logDatabaseFood = () => {
                if(newFood.name && newFood.calories > 0) {
                    setFoodLog([...foodLog, { 
                        ...newFood, 
                        id: Date.now(),
                        desc: `${newFood.amount}${newFood.unit}`
                    }]);
                    setNewFood({ name: '', amount: 1, unit: 'cup', calories: 0, carbs: 0, protein: 0, fat: 0 });
                    setFoodSearchTerm('');
                }
            };

            const logQuickFood = () => {
                if(quickFood.name && quickFood.calories) {
                    setFoodLog([...foodLog, { 
                        name: quickFood.name, 
                        calories: quickFood.calories,
                        carbs: 0, protein: 0, fat: 0,
                        id: Date.now(),
                        desc: 'Quick Add'
                    }]);
                    setQuickFood({ name: '', calories: '' });
                }
            };

            const removeFood = (id) => setFoodLog(foodLog.filter(f => f.id !== id));

            const consumed = foodLog.reduce((acc, curr) => ({
                cals: acc.cals + Number(curr.calories || 0),
                carbs: acc.carbs + Number(curr.carbs || 0),
                protein: acc.protein + Number(curr.protein || 0),
                fat: acc.fat + Number(curr.fat || 0)
            }), { cals: 0, carbs: 0, protein: 0, fat: 0 });

            // Custom Audio Warning Engine (Works 100% Offline)
            const playAlertSound = () => {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContext) return;
                    const ctx = new AudioContext();
                    const osc = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    
                    // Create a loud "BUZZ" alarm sound
                    osc.type = 'sawtooth'; // Harsher, buzzy waveform
                    osc.frequency.setValueAtTime(120, ctx.currentTime); // Low buzzer pitch
                    
                    // Start loud (volume at 80% instead of 5%)
                    gainNode.gain.setValueAtTime(0.8, ctx.currentTime);
                    
                    // Create an "eh-eh-eh" stuttering buzzer effect
                    gainNode.gain.setValueAtTime(0.01, ctx.currentTime + 0.15);
                    gainNode.gain.setValueAtTime(0.8, ctx.currentTime + 0.20);
                    gainNode.gain.setValueAtTime(0.01, ctx.currentTime + 0.35);
                    gainNode.gain.setValueAtTime(0.8, ctx.currentTime + 0.40);
                    
                    // Fade out sharply
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
                    
                    osc.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.6);
                } catch (e) { console.log("Audio failed", e); }
            };

            // Detect Limit Breaches and Trigger Sound
            useEffect(() => {
                if (stats && consumed) {
                    const isWarning = consumed.cals >= stats.targetCalories * 0.9 || 
                                      consumed.carbs >= stats.macros.carbs * 0.9 ||
                                      consumed.protein >= stats.macros.protein * 0.9 ||
                                      consumed.fat >= stats.macros.fat * 0.9;
                    if (isWarning && !warningPlayed) {
                        playAlertSound();
                        setWarningPlayed(true);
                    } else if (!isWarning && warningPlayed) {
                        setWarningPlayed(false); // Reset if they delete foods and drop back below limits
                    }
                }
            }, [consumed, stats, warningPlayed]);

            const handleSavePDF = async () => {
                setIsGeneratingPDF(true);
                const element = document.getElementById('dashboard-content');
                document.body.classList.add('pdf-mode');
                
                const opt = {
                    margin:       0.1, // Reduced margin to ensure fit
                    filename:     `CHOP_Report_${profile.firstName}_${profile.lastName}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true },
                    jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
                };

                setTimeout(async () => {
                    await html2pdf().set(opt).from(element).save();
                    document.body.classList.remove('pdf-mode');
                    setIsGeneratingPDF(false);
                }, 100);
            };

            const handleSaveExerciseImage = async () => {
                setIsSavingImage(true);
                const element = document.getElementById('exercise-plan-container');
                if (element) {
                    const btn = document.getElementById('save-img-btn');
                    if (btn) btn.style.display = 'none'; // Temporarily hide the button from the image
                    
                    try {
                        const canvas = await window.html2canvas(element, { 
                            scale: 2, 
                            useCORS: true,
                            backgroundColor: '#ffffff'
                        });
                        const link = document.createElement('a');
                        link.download = `Exercise_Plan_${profile.firstName || 'Patient'}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    } catch (err) {
                        console.error("Failed to save image", err);
                    }
                    
                    if (btn) btn.style.display = 'flex'; // Restore button
                }
                setIsSavingImage(false);
            };

            const startQuickTracker = () => {
                if (quickTrackerCalories && quickTrackerCalories > 0) {
                    setQuickTrackerActive(true);
                    setStep(4);
                }
            };

            const renderIntro = () => (
                <div className="flex flex-col items-center justify-center min-h-[100dvh] px-6 bg-gradient-to-b from-[#f2f2f7] to-white">
                    <div className="text-center animate-ios-intro mb-12">
                        <div className="w-24 h-24 bg-gradient-to-tr from-red-500 to-pink-500 rounded-3xl mx-auto mb-6 shadow-xl flex items-center justify-center text-white border-4 border-white">
                            <svg xmlns="http://www.w3.org/2000/svg" className="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                                <path d="M12 7v6"/>
                                <path d="M9 10h6"/>
                            </svg>
                        </div>
                        <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight text-gray-900 mb-3 leading-tight">
                            Yozuri Philippines
                        </h1>
                        <h2 className="text-xl md:text-2xl font-medium text-gray-500 max-w-sm mx-auto leading-snug">
                            Clinical Health Optimization Program
                        </h2>
                        <p className="text-xs text-red-600 mt-6 max-w-sm mx-auto leading-relaxed border border-red-200 bg-red-50 p-3 rounded-lg shadow-sm">
                            <strong>Disclaimer:</strong> All content of this app was researched, written, coded, made, tested and will be constantly updated by <strong>Kenneth Roy Ocampo, RN</strong> based on the needs and sources of YPI employees.
                        </p>
                    </div>
                    
                    <div className="w-full max-w-sm space-y-4 animate-ios-buttons">
                        <button 
                            onClick={() => setStep(0.5)} 
                            className="w-full bg-[#007aff] text-white text-lg font-semibold py-4 px-6 rounded-2xl shadow-lg hover:bg-blue-600 active:scale-95 transition-all flex justify-between items-center">
                            <span>Clinical Assessment</span>
                            <i className="lucide-chevron-right w-5 h-5 opacity-70"></i>
                        </button>
                        <button 
                            onClick={() => setStep(5)} 
                            className="w-full bg-white text-[#007aff] border border-[#e5e5ea] text-lg font-semibold py-4 px-6 rounded-2xl shadow-sm hover:bg-gray-50 active:scale-95 transition-all flex justify-between items-center">
                            <span>Quick Calorie Tracker</span>
                            <i className="lucide-zap w-5 h-5 opacity-70"></i>
                        </button>
                        <button 
                            onClick={() => setStep(6)} 
                            className="w-full bg-white text-emerald-600 border border-[#e5e5ea] text-lg font-semibold py-4 px-6 rounded-2xl shadow-sm hover:bg-emerald-50 active:scale-95 transition-all flex justify-between items-center mt-2">
                            <span>Exercise Guides</span>
                            <i className="lucide-play-circle w-5 h-5 opacity-70"></i>
                        </button>
                    </div>
                </div>
            );

            const renderDisclaimer = () => (
                <div className="max-w-md mx-auto space-y-6 animate-ios-intro mt-12 text-center px-4">
                    <div className="w-24 h-24 bg-red-100 text-red-600 rounded-full mx-auto flex items-center justify-center mb-6 shadow-sm border border-red-200">
                        {/* Custom Medical Warning Icon */}
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-12 h-12">
                            <path d="M7.86 2h8.28L22 7.86v8.28L16.14 22H7.86L2 16.14V7.86L7.86 2z"></path>
                            <path d="M12 8v4"></path>
                            <path d="M12 16h.01"></path>
                        </svg>
                    </div>
                    <h2 className="text-3xl font-bold text-gray-900">Medical Disclaimer</h2>
                    <div className="bg-white p-6 rounded-2xl border border-red-100 shadow-sm text-left">
                        <p className="text-gray-700 leading-relaxed font-medium">
                            Before beginning this or any exercise and nutrition program, it is highly recommended that you seek medical advice from your company nurse or a qualified doctor.
                        </p>
                        <p className="text-gray-500 text-sm leading-relaxed mt-4">
                            By proceeding, you acknowledge that you have consulted a healthcare professional or are participating at your own risk.
                        </p>
                    </div>
                    <div className="h-20 flex items-center justify-center mt-8">
                        {canProceed ? (
                            <button 
                                onClick={() => setStep(1)} 
                                className="ios-button animate-ios-intro w-full shadow-lg">
                                Proceed to Assessment
                            </button>
                        ) : (
                            <p className="text-sm text-red-400 font-medium animate-pulse">Please read the disclaimer carefully...</p>
                        )}
                    </div>
                </div>
            );

            const renderExerciseDisclaimer = () => (
                <div className="max-w-md mx-auto space-y-6 animate-ios-intro mt-12 text-center px-4">
                    <div className="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full mx-auto flex items-center justify-center mb-6 shadow-sm border border-emerald-200">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-12 h-12">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path>
                        </svg>
                    </div>
                    <h2 className="text-3xl font-bold text-gray-900">Safety & Guidelines</h2>
                    <div className="bg-white p-6 rounded-2xl border border-emerald-100 shadow-sm text-left space-y-4">
                        <div className="flex gap-3 items-start">
                            <div className="text-red-500 mt-0.5">⚠️</div>
                            <div>
                                <h4 className="font-bold text-gray-900 text-sm">Warning Symptoms</h4>
                                <p className="text-gray-600 text-sm mt-1">Stop exercising immediately and seek medical help if you experience dizziness, lightheadedness, chest pain, or severe shortness of breath.</p>
                            </div>
                        </div>
                        <div className="flex gap-3 items-start">
                            <div className="text-amber-500 mt-0.5">🍎</div>
                            <div>
                                <h4 className="font-bold text-gray-900 text-sm">Pre-Workout Fuel</h4>
                                <p className="text-gray-600 text-sm mt-1">Do not exercise on a completely empty stomach. Ensure you have eaten a light, easily digestible meal 1 to 2 hours before your workout to prevent low blood sugar.</p>
                            </div>
                        </div>
                        <div className="flex gap-3 items-start">
                            <div className="text-emerald-500 mt-0.5">🔥</div>
                            <div>
                                <h4 className="font-bold text-gray-900 text-sm">Always Warm Up</h4>
                                <p className="text-gray-600 text-sm mt-1">Perform 5-10 minutes of light cardio (like marching in place or arm circles) to prepare your muscles and joints.</p>
                            </div>
                        </div>
                        <div className="flex gap-3 items-start">
                            <div className="text-emerald-500 mt-0.5">📏</div>
                            <div>
                                <h4 className="font-bold text-gray-900 text-sm">Prioritize Proper Form</h4>
                                <p className="text-gray-600 text-sm mt-1">Quality is better than quantity. Move slowly and with control. If you feel sharp joint pain (not muscle burn), STOP immediately.</p>
                            </div>
                        </div>
                        <div className="flex gap-3 items-start">
                            <div className="text-blue-500 mt-0.5">💧</div>
                            <div>
                                <h4 className="font-bold text-gray-900 text-sm">Stay Hydrated</h4>
                                <p className="text-gray-600 text-sm mt-1">Drink water before, during, and after your workout to prevent cramping and dizziness.</p>
                            </div>
                        </div>
                    </div>
                    <div className="h-20 flex items-center justify-center mt-8">
                        {canProceed ? (
                            <button 
                                onClick={() => setStep(7)} 
                                className="w-full bg-emerald-500 text-white text-lg font-semibold py-4 px-6 rounded-2xl shadow-lg hover:bg-emerald-600 active:scale-95 transition-all animate-ios-intro">
                                I Understand
                            </button>
                        ) : (
                            <p className="text-sm text-emerald-500 font-medium animate-pulse">Please read safety instructions...</p>
                        )}
                    </div>
                </div>
            );

            const renderHeader = () => (
                <div className="glass-nav sticky top-0 z-50 px-6 py-4 mb-6">
                    <div className="max-w-2xl mx-auto flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            {/* Stylish iOS Style Back Buttons */}
                            {(step === 0.5 || step === 1 || step === 5 || step === 6 || step === 7) && (
                                <button onClick={() => setStep(0)} className="flex items-center gap-1 text-[#007aff] bg-[#007aff]/10 hover:bg-[#007aff]/20 active:scale-95 px-3 py-1.5 rounded-full font-semibold transition-all no-print shadow-sm">
                                    <i className="lucide-chevron-left w-5 h-5 -ml-1"></i> Back
                                </button>
                            )}
                            {step > 1 && step < 4 && !quickTrackerActive && (
                                <button onClick={() => setStep(step - 1)} className="flex items-center gap-1 text-[#007aff] bg-[#007aff]/10 hover:bg-[#007aff]/20 active:scale-95 px-3 py-1.5 rounded-full font-semibold transition-all no-print shadow-sm">
                                    <i className="lucide-chevron-left w-5 h-5 -ml-1"></i> Back
                                </button>
                            )}
                            {step === 4 && quickTrackerActive && (
                                <button onClick={() => { setQuickTrackerActive(false); setStep(5); }} className="flex items-center gap-1 text-[#007aff] bg-[#007aff]/10 hover:bg-[#007aff]/20 active:scale-95 px-3 py-1.5 rounded-full font-semibold transition-all no-print shadow-sm">
                                    <i className="lucide-chevron-left w-5 h-5 -ml-1"></i> Back
                                </button>
                            )}
                            {step === 4 && !quickTrackerActive && (
                                <button onClick={() => setStep(3)} className="flex items-center gap-1 text-[#007aff] bg-[#007aff]/10 hover:bg-[#007aff]/20 active:scale-95 px-3 py-1.5 rounded-full font-semibold transition-all no-print shadow-sm">
                                    <i className="lucide-chevron-left w-5 h-5 -ml-1"></i> Back
                                </button>
                            )}
                            
                            {/* Hidden on steps 0.5, 1, 2, 3, 6 */}
                            {(step === 4 || step === 5 || step === 7) && (
                                <div>
                                    <p className="text-sm font-bold text-gray-900 mt-1 uppercase tracking-wide">By Kenneth Roy Ocampo, RN 2026</p>
                                    <p className="text-[10px] text-gray-400 mt-0.5">{displayDateTime}</p>
                                </div>
                            )}
                        </div>
                        
                        {step === 4 && !quickTrackerActive && (
                            <div className="flex gap-3 no-print">
                                <button onClick={() => window.print()} className="bg-gray-200 text-gray-800 px-4 py-2 rounded-lg flex items-center gap-2 font-bold hover:bg-gray-300 transition">
                                    <i className="lucide-printer w-4 h-4"></i> Print
                                </button>
                                <button onClick={handleSavePDF} disabled={isGeneratingPDF} className="bg-blue-500 text-white px-4 py-2 rounded-lg flex items-center gap-2 font-bold hover:bg-blue-600 transition disabled:opacity-50">
                                    <i className="lucide-download w-4 h-4"></i> {isGeneratingPDF ? 'Saving...' : 'Save PDF'}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );

            const renderStep1 = () => (
                <div className="max-w-md mx-auto space-y-4 animate-fade-in">
                    <div className="mb-8 text-center">
                        <h2 className="text-3xl font-bold mb-2">Patient Profile</h2>
                        <p className="text-gray-500">Enter physical metrics for metabolic baseline.</p>
                    </div>

                    <div className="grid grid-cols-2 gap-4">

                        {!quickTrackerActive && (
                        <div id="exercise-plan-container" className="ios-card p-6 !mt-2 bg-white relative border border-gray-100">
                            <div className="flex items-center justify-between mb-4 border-b border-gray-100 pb-3">
                                <h3 className="font-semibold text-lg text-emerald-600 flex items-center gap-2 uppercase tracking-wide">
                                    💪 Prescribed Exercise Regimen
                                </h3>
                                <button id="save-img-btn" onClick={handleSaveExerciseImage} disabled={isSavingImage} className="bg-[#007aff] text-white px-5 py-2 rounded-full text-xs font-bold hover:bg-blue-600 transition flex items-center gap-1.5 no-print disabled:opacity-50 shadow-md">
                                    <i className="lucide-download w-4 h-4"></i> {isSavingImage ? 'Saving...' : 'Save Exercise'}
                                </button>
                            </div>
                            
                            {(profile.conditions.includes('heart') || profile.conditions.includes('asthma')) && (
                                <div className="bg-amber-50 text-amber-800 p-3 rounded-xl mb-4 text-sm font-medium border border-amber-200">
                                    ⚠️ Medical Clearance Required. Stop immediately if experiencing chest pain. Ensure inhaler is present if asthmatic.
                                </div>
                            )}

                            <div className="grid grid-cols-1 md:grid-cols-2 print:grid-cols-2 gap-6 print:gap-3">
                                {/* LEFT COLUMN: List of Activity and Schedule */}
                                <div className="space-y-5">
                                    <div>
                                        <h4 className="font-bold text-sm text-gray-800 mb-3 border-b border-gray-100 pb-1 uppercase tracking-wider">📅 Weekly Schedule</h4>
                                        <div className="space-y-1.5">
                                            {weeklySchedule.map((day, i) => (
                                                <div key={i} className="flex flex-col p-2 rounded-lg bg-gray-50 border border-gray-100 text-xs print-schedule-day">
                                                    <div className="flex items-center mb-1 print:mb-0">
                                                        <span className="font-bold text-gray-800 w-12 shrink-0 uppercase">{day.day}</span>
                                                        <span className={`font-bold uppercase tracking-wider text-[9px] px-1.5 py-0.5 rounded-sm ${day.plan === 'Rest' ? 'bg-gray-200 text-gray-600' : day.plan === 'Walk' ? 'bg-blue-100 text-blue-700' : 'bg-emerald-100 text-emerald-700'}`}>
                                                            {day.plan}
                                                        </span>
                                                    </div>
                                                    <div className="text-gray-600 text-[10px] leading-snug">
                                                        {day.details}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <h4 className="font-bold text-sm text-gray-800 mb-3 border-b border-gray-100 pb-1 uppercase tracking-wider">📋 Activity Instructions</h4>
                                        {/* Updated to use print-instructions-list for tight text spacing */}
                                        <ul className="text-[11px] md:text-xs text-gray-600 space-y-2 list-disc pl-4 pr-2 print-instructions-list">
                                            <li><strong>Interval Walking:</strong> Walk fast for 3 minutes (until you are breathing heavily), then walk slowly for 3 minutes to catch your breath. Repeat this 5 times total.</li>
                                            <li><strong>Strength Exercises:</strong> Do each movement slowly and with control to avoid injury. {isBulking ? "Use a heavy backpack or large water jugs to challenge your muscles." : "Use your body weight. Follow the easier variations in the pictures if needed."}</li>
                                            <li><strong>Circuit Routine:</strong> Do the exercises one after the other. Try to keep your rest short—only take 30 to 45 seconds of rest before moving to the next exercise.</li>
                                            <li><strong>Rest Days:</strong> Rest is just as important as exercise! Take the day off to let your body heal. Light stretching or a relaxed walk is okay.</li>
                                        </ul>
                                    </div>
                                </div>

                                {/* RIGHT COLUMN: Pictures of Exercise */}
                                <div className="flex flex-col h-full">
                                    <h4 className="font-bold text-sm text-gray-800 mb-3 border-b border-gray-100 pb-1 uppercase tracking-wider">
                                        <span className="no-print">📸 Visual Reference Guide</span>
                                        <span className="print-only">📋 Prescribed Exercises</span>
                                    </h4>
                                    
                                    <div className="grid grid-cols-2 exercise-img-grid gap-3">
                                        {/* Dynamically mapped based on the 4-tier condition logic above */}
                                        {exerciseList.map((ex, i) => (
                                            <div 
                                                key={i} 
                                                className="border border-gray-200 p-2 rounded-lg flex flex-col items-center text-center bg-gray-50 shadow-sm cursor-pointer hover:shadow-md transition no-print-break exercise-card-print"
                                                onClick={() => setEnlargedImage({ img: ex.img, name: ex.name, guide: exerciseGuides[ex.img] || 'Perform this exercise slowly and with controlled form. Focus on muscle contraction and safety.' })}
                                            >
                                                <img src={ex.img} alt={ex.name} className="h-24 md:h-32 w-full object-contain bg-white rounded mb-2 border border-gray-100 exercise-img" />
                                                <div className="flex flex-col print:flex-row print:justify-between print:w-full items-center print:items-end w-full">
                                                    <div className="text-[10px] md:text-[11px] font-bold leading-tight text-gray-800 w-full truncate print:text-left">{ex.name}</div>
                                                    <div className="text-[9px] md:text-[10px] font-medium text-gray-500 mt-0.5 print:mt-0 print:text-right">{ex.reps}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <p className="text-[10px] text-gray-400 mt-2 text-center italic no-print">* Tap on any image to view written guide</p>
                                    
                                    {/* QR Code placed at the bottom right of the page for print */}
                                    <div className="print-only mt-auto pt-3 flex justify-end">
                                        <div className="text-center border border-gray-200 p-2.5 rounded-xl bg-white flex flex-col items-center shadow-sm">
                                            <img src="./qr_access.jpg" alt="QR Access" className="w-28 h-28 object-contain" />
                                            <span className="text-[7pt] font-extrabold text-gray-800 mt-1.5 tracking-widest uppercase">Scan For App</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        )}

                        {/* Food Tracker Engine - Always shows, but hidden entirely on Print to save space */}
                        <div className="ios-card p-6 no-print">
                            <h3 className="font-semibold text-lg text-purple-600 mb-4 flex items-center gap-2">
                                🍽️ Automated Daily Intake Tracker
                            </h3>
                            
                            <div className="bg-gray-50 rounded-xl p-4 mb-6 border border-gray-200">
                                <div className="flex justify-between items-end mb-2">
                                    <span className="font-semibold text-sm">{stats.targetCalories - consumed.cals < 0 ? 'Excess Calories' : 'Calories Remaining'}</span>
                                    <span className={`text-3xl font-bold ${stats.targetCalories - consumed.cals < 0 ? 'text-red-600' : 'text-purple-700'}`}>
                                        {stats.targetCalories - consumed.cals < 0 ? `+${Math.abs(stats.targetCalories - consumed.cals)}` : stats.targetCalories - consumed.cals}
                                    </span>
                                </div>
                                <div className="w-full bg-gray-200 rounded-full h-3 mb-1">
                                    <div className={`h-3 rounded-full transition-all ${consumed.cals > stats.targetCalories ? 'bg-red-500' : 'bg-purple-500'}`} style={{width: `${Math.min(100, (consumed.cals/stats.targetCalories)*100)}%`}}></div>
                                </div>
                                <div className="flex justify-between text-xs text-gray-500 mt-2 font-medium">
                                    <span>Carbs: <span className={consumed.carbs > stats.macros.carbs ? 'text-red-600 font-bold' : 'text-amber-600'}>{Math.round(consumed.carbs)} / {stats.macros.carbs}g</span></span>
                                    <span>Pro: <span className={consumed.protein > stats.macros.protein ? 'text-red-600 font-bold' : 'text-red-600'}>{Math.round(consumed.protein)} / {stats.macros.protein}g</span></span>
                                    <span>Fat: <span className={consumed.fat > stats.macros.fat ? 'text-red-600 font-bold' : 'text-teal-600'}>{Math.round(consumed.fat)} / {stats.macros.fat}g</span></span>
                                </div>
                                
                                {/* Dynamic Macro & Calorie Warning Alerts */}
                                {(() => {
                                    let warnings = [];
                                    if (consumed.cals >= stats.targetCalories * 0.9) warnings.push("Calories");
                                    if (consumed.carbs >= stats.macros.carbs * 0.9) warnings.push("Carbs");
                                    if (consumed.protein >= stats.macros.protein * 0.9) warnings.push("Protein");
                                    if (consumed.fat >= stats.macros.fat * 0.9) warnings.push("Fats");
                                    
                                    const isOverLimit = consumed.cals > stats.targetCalories || consumed.carbs > stats.macros.carbs || consumed.protein > stats.macros.protein || consumed.fat > stats.macros.fat;

                                    if (warnings.length > 0) {
                                        return (
                                            <div className={`mt-4 p-3 rounded-xl flex items-start gap-2 border ${isOverLimit ? 'bg-red-50 text-red-700 border-red-200' : 'bg-amber-50 text-amber-700 border-amber-200'}`}>
                                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 shrink-0 mt-0.5">
                                                    <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path>
                                                    <path d="M12 9v4"></path>
                                                    <path d="M12 17h.01"></path>
                                                </svg>
                                                <div>
                                                    <strong className="block text-sm uppercase tracking-wide">{isOverLimit ? 'Limit Exceeded' : 'Approaching Limit'}</strong>
                                                    <span className="text-xs">You are nearing or exceeding your daily allowance for: <span className="font-bold">{warnings.join(', ')}</span>.</span>
                                                </div>
                                            </div>
                                        );
                                    }
                                    return null;
                                })()}
                            </div>

                            {/* Option 1: Database Add */}
                            <div className="bg-white border border-gray-200 rounded-xl p-4 mb-4">
                                <h4 className="font-bold text-sm text-purple-700 mb-1">Option 1: Food Database</h4>
                                <p className="text-xs text-gray-500 mb-3">Select a food to auto-calculate locked macros.</p>
                                <div className="flex gap-2 mb-3 relative">
                                    <div className="relative flex-1">
                                        <input 
                                            className="ios-input !p-2 text-sm w-full" 
                                            placeholder="SEARCH DATABASE..." 
                                            value={foodSearchTerm} 
                                            onChange={e => {
                                                setFoodSearchTerm(e.target.value);
                                                setShowDropdown(true);
                                                recalculateFromDb(e.target.value, newFood.amount, newFood.unit);
                                            }}
                                            onFocus={() => setShowDropdown(true)}
                                            onBlur={() => setTimeout(() => setShowDropdown(false), 200)}
                                        />
                                        {showDropdown && (
                                            <ul className="absolute z-10 w-full bg-white border border-gray-200 rounded-lg shadow-xl max-h-48 overflow-y-auto mt-1 left-0 text-left">
                                                {Object.keys(foodDatabase)
                                                    .filter(f => f.toLowerCase().includes(foodSearchTerm.toLowerCase()))
                                                    .map(f => (
                                                    <li 
                                                        key={f} 
                                                        className="p-2.5 text-sm text-gray-700 hover:bg-purple-50 cursor-pointer border-b border-gray-100 last:border-0 transition-colors"
                                                        onClick={() => handleSelectFood(f)}
                                                    >
                                                        {f}
                                                    </li>
                                                ))}
                                                {Object.keys(foodDatabase).filter(f => f.toLowerCase().includes(foodSearchTerm.toLowerCase())).length === 0 && (
                                                    <li className="p-3 text-sm text-gray-400 text-center italic">No foods found.</li>
                                                )}
                                            </ul>
                                        )}
                                    </div>
                                    
                                    <input className="ios-input !p-2 text-sm w-16" type="number" placeholder="AMT" value={newFood.amount} onChange={e => recalculateFromDb(newFood.name, e.target.value, newFood.unit)}/>
                                    <select className="ios-input !p-2 text-sm w-20 bg-gray-50 text-gray-500" value={newFood.unit} disabled>
                                        <option value="g">G</option>
                                        <option value="cup">CUP</option>
                                        <option value="pc">PC</option>
                                    </select>
                                </div>
                                <div className="flex gap-2 items-center bg-gray-50 p-2 rounded-lg">
                                    {/* Macros are now Read-Only UI elements */}
                                    <div className="ios-input !p-2 text-sm w-full bg-gray-100 text-gray-500 text-center select-none">C: {newFood.carbs || 0}g</div>
                                    <div className="ios-input !p-2 text-sm w-full bg-gray-100 text-gray-500 text-center select-none">P: {newFood.protein || 0}g</div>
                                    <div className="ios-input !p-2 text-sm w-full bg-gray-100 text-gray-500 text-center select-none">F: {newFood.fat || 0}g</div>
                                    <div className="text-sm font-bold w-full text-center text-purple-700">{newFood.calories || 0} kcal</div>
                                    <button className="bg-purple-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-purple-600 transition disabled:opacity-50" disabled={!newFood.calories} onClick={logDatabaseFood}>+</button>
                                </div>
                            </div>

                            {/* Option 2: Quick Add Calories */}
                            <div className="bg-white border border-gray-200 rounded-xl p-4 mb-6">
                                <h4 className="font-bold text-sm text-blue-600 mb-1">Option 2: Quick Add Calories</h4>
                                <p className="text-xs text-gray-500 mb-3">Add unlisted foods. Macros will not be tracked, only calories.</p>
                                <div className="flex gap-2">
                                    <input className="ios-input !p-2 text-sm flex-1" placeholder="CUSTOM FOOD NAME..." value={quickFood.name} onChange={e => setQuickFood({...quickFood, name: e.target.value.toUpperCase()})} />
                                    <input className="ios-input !p-2 text-sm w-24" type="number" placeholder="TOTAL KCAL" value={quickFood.calories} onChange={e => setQuickFood({...quickFood, calories: e.target.value})} />
                                    <button className="bg-blue-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-600 transition disabled:opacity-50" disabled={!quickFood.name || !quickFood.calories} onClick={logQuickFood}>+</button>
                                </div>
                            </div>

                            {/* Log Display */}
                            <div className="space-y-2">
                                {foodLog.map(f => (
                                    <div key={f.id} className="flex justify-between items-center p-3 bg-white border border-gray-100 rounded-lg text-sm shadow-sm">
                                        <div>
                                            <p className="font-semibold">{f.name}</p>
                                            <p className="text-xs text-gray-500">
                                                {f.desc} {f.desc !== 'Quick Add' ? `• ${f.carbs}C • ${f.protein}P • ${f.fat}F` : ''}
                                            </p>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <span className="font-bold">{f.calories} kcal</span>
                                            <button onClick={() => removeFood(f.id)} className="text-red-400 hover:text-red-600 transition">🗑️</button>
                                        </div>
                                    </div>
                                ))}
                                {foodLog.length === 0 && <p className="text-center text-gray-400 text-sm py-4">No foods logged today.</p>}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderExerciseLibrary = () => {
                const cardio = [
                    { img: appImages.intervalWalking, name: "Interval Walk" },
                    { img: appImages.joggingVsRunning, name: "Jogging" },
                    { img: appImages.skaters, name: "Skaters" },
                    { img: appImages.mountainClimbers, name: "Mountain Climbers" },
                    { img: appImages.burpees, name: "Burpees" }
                ];
                
                const bodyweight = [
                    { img: appImages.squatBW, name: "Air Squats" },
                    { img: appImages.jumpSquat, name: "Jump Squats" },
                    { img: appImages.pushupBW, name: "Standard Push-up" },
                    { img: appImages.pushupKnee, name: "Knee Push-ups" },
                    { img: appImages.pushupWall, name: "Wall Push-ups" },
                    { img: appImages.pushupIncline, name: "Incline Push-ups" },
                    { img: appImages.pushupDiamond, name: "Diamond Push-ups" },
                    { img: appImages.rowBW, name: "Doorway Row" },
                    { img: appImages.lungeBW, name: "Walking Lunge" },
                    { img: appImages.lateralLunge, name: "Lateral Lunge" },
                    { img: appImages.assistedLunge, name: "Assisted Lunge" },
                    { img: appImages.stepUp, name: "Step-ups" },
                    { img: appImages.accessoryBW, name: "Glute Bridge" },
                    { img: appImages.singleLegBridge, name: "Single Leg Bridge" },
                    { img: appImages.assistedSquat, name: "Assisted Squat" },
                    { img: appImages.plankVariations, name: "Plank Variations" },
                    { img: appImages.plankReachUnder, name: "Plank Reach" },
                    { img: appImages.tricepDips, name: "Tricep Dips" }
                ];

                const weighted = [
                    { img: appImages.squatHeavy, name: "Bulgarian Split Squat" },
                    { img: appImages.backpackLunge, name: "Backpack Lunge" },
                    { img: appImages.backpackSquat, name: "Backpack Squat" },
                    { img: appImages.gobletSquat, name: "Goblet Squat" },
                    { img: appImages.pushupDecline, name: "Decline Push-up" },
                    { img: appImages.backpackPushup, name: "Weighted Push-up" },
                    { img: appImages.rowTable, name: "Table Row" },
                    { img: appImages.jugRow, name: "Jug Row" },
                    { img: appImages.pullup, name: "Pull-ups" },
                    { img: appImages.suitcaseDeadlift, name: "Suitcase Deadlift" },
                    { img: appImages.towelDeadlift, name: "Towel Deadlift" },
                    { img: appImages.pistolSquat, name: "Pistol Squat" },
                    { img: appImages.bicepCurls, name: "Bicep Curls" },
                    { img: appImages.accessoryHeavy, name: "Hamstring Curl" }
                ];

                const renderGrid = (title, items) => (
                    <div className="mb-8">
                        <h3 className="font-bold text-lg text-gray-800 mb-3 border-b border-gray-200 pb-2">{title}</h3>
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                            {items.map((ex, i) => (
                                <div 
                                    key={i} 
                                    className="border border-gray-200 p-2 rounded-lg flex flex-col items-center text-center bg-white shadow-sm cursor-pointer hover:shadow-md transition"
                                    onClick={() => setEnlargedImage({ img: ex.img, name: ex.name, guide: exerciseGuides[ex.img] || 'Perform this exercise slowly and with controlled form. Focus on muscle contraction and safety.' })}
                                >
                                    <img src={ex.img} alt={ex.name} className="h-28 w-full object-contain bg-white rounded mb-2 border border-gray-100" />
                                    <div className="text-xs font-bold leading-tight text-gray-800 w-full truncate">{ex.name}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                );

                return (
                    <div className="max-w-2xl mx-auto pb-20 animate-fade-in">
                        <div className="text-center mb-8">
                            <h2 className="text-3xl font-extrabold uppercase tracking-widest text-emerald-600">Exercise Library</h2>
                            <p className="text-gray-500 text-sm mt-2">Tap any image to view written instructions and proper form.</p>
                        </div>
                        
                        {renderGrid("Cardio & Agility", cardio)}
                        {renderGrid("Bodyweight & Rehab", bodyweight)}
                        {renderGrid("Weighted & Advanced", weighted)}
                    </div>
                );
            };

            return (
                <div className="min-h-screen relative">
                    {step > 0 && renderHeader()}
                    <div className={step > 0 ? "px-6" : ""}>
                        {step === 0 && renderIntro()}
                        {step === 0.5 && renderDisclaimer()}
                        {step === 1 && renderStep1()}
                        {step === 2 && renderStep2()}
                        {step === 3 && renderStep3()}
                        {step === 4 && renderDashboard()}
                        {step === 5 && renderQuickTrackSetup()}
                        {step === 6 && renderExerciseDisclaimer()}
                        {step === 7 && renderExerciseLibrary()}
                    </div>

                    {/* Fullscreen Image & Guide Lightbox Overlay */}
                    {enlargedImage && (
                        <div 
                            className="fixed inset-0 z-[100] bg-black/90 flex flex-col items-center justify-center p-4 cursor-pointer no-print backdrop-blur-sm"
                            onClick={() => setEnlargedImage(null)}
                        >
                            <div 
                                className="bg-white rounded-2xl overflow-hidden max-w-sm w-full shadow-2xl cursor-default flex flex-col animate-ios-intro" 
                                onClick={(e) => e.stopPropagation()}
                            >
                                <div className="relative bg-gray-100 flex justify-center p-4">
                                    <img 
                                        src={enlargedImage.img} 
                                        alt={enlargedImage.name} 
                                        className="max-h-[45vh] object-contain rounded-xl" 
                                    />
                                </div>
                                <div className="p-6">
                                    <h3 className="text-xl font-bold text-gray-900 mb-2">{enlargedImage.name}</h3>
                                    <p className="text-sm text-gray-600 leading-relaxed font-medium">
                                        {enlargedImage.guide}
                                    </p>
                                </div>
                            </div>
                            
                            <button 
                                className="absolute top-6 right-6 text-white bg-black/50 rounded-full p-2 hover:bg-white/20 transition"
                                onClick={() => setEnlargedImage(null)}
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                            <p className="text-gray-300 mt-4 text-sm tracking-wide font-medium">Tap outside to close</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
