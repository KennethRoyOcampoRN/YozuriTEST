                                <button onClick={() => window.print()} className="bg-gray-200 text-gray-800 px-4 py-2 rounded-lg flex items-center gap-2 font-bold hover:bg-gray-300 transition">
                                    <i className="lucide-printer w-4 h-4"></i> Print
                                </button>
                                <button onClick={handleSavePDF} disabled={isGeneratingPDF} className="bg-blue-500 text-white px-4 py-2 rounded-lg flex items-center gap-2 font-bold hover:bg-blue-600 transition disabled:opacity-50">
                                    <i className="lucide-download w-4 h-4"></i> {isGeneratingPDF ? 'Saving...' : 'Save PDF'}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );

            const renderStep1 = () => (
                <div className="max-w-md mx-auto space-y-4 animate-fade-in">
                    <div className="mb-8 text-center">
                        <h2 className="text-3xl font-bold mb-2">Patient Profile</h2>
                        <p className="text-gray-500">Enter physical metrics for metabolic baseline.</p>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <input className="ios-input" placeholder="FIRST NAME" value={profile.firstName} onChange={e => setProfile({...profile, firstName: e.target.value.toUpperCase()})} />
                        <input className="ios-input" placeholder="LAST NAME" value={profile.lastName} onChange={e => setProfile({...profile, lastName: e.target.value.toUpperCase()})} />
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <input className="ios-input" type="number" placeholder="AGE" value={profile.age} onChange={e => setProfile({...profile, age: e.target.value})} />
                        <select className="ios-input bg-white" value={profile.gender} onChange={e => setProfile({...profile, gender: e.target.value})}>
                            <option value="Male">MALE</option>
                            <option value="Female">FEMALE</option>
                        </select>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <input className="ios-input" type="number" placeholder="WEIGHT (KG)" value={profile.weight} onChange={e => setProfile({...profile, weight: e.target.value})} />
                        <input className="ios-input" type="number" placeholder="HEIGHT (CM)" value={profile.height} onChange={e => setProfile({...profile, height: e.target.value})} />
                    </div>
                    
                    <div className="mt-8">
                        <h3 className="font-bold text-lg mb-3">Activity Level</h3>
                        <div className="space-y-3">
                            {activityLevels.map(act => (
                                <div key={act.id} className={`ios-card p-3 option-card cursor-pointer flex items-center gap-4 ${profile.activityLevel === act.id ? 'selected' : ''}`} onClick={() => setProfile({...profile, activityLevel: act.id})}>
                                    <img src={act.img} alt={act.label} className="w-16 h-16 rounded-xl object-cover" />
                                    <div className="flex-1">
                                        <h4 className="font-semibold">{act.label}</h4>
                                        <p className="text-xs text-gray-500">{act.desc}</p>
                                    </div>
                                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center shrink-0 ${profile.activityLevel === act.id ? 'border-blue-500 bg-blue-500' : 'border-gray-300'}`}>
                                        {profile.activityLevel === act.id && <div className="w-2.5 h-2.5 bg-white rounded-full"></div>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <button className="ios-button mt-8" disabled={!profile.firstName || !profile.age || !profile.weight || !profile.height} onClick={() => setStep(2)}>Continue to Assessment</button>
                </div>
            );

            const renderStep2 = () => (
                <div className="max-w-md mx-auto space-y-4">
                    <div className="mb-8 text-center">
                        <h2 className="text-3xl font-bold mb-2">Clinical Goal</h2>
                        <p className="text-gray-500">Select the primary objective to determine caloric targets.</p>
                    </div>
                    <div className="space-y-3">
                        {goals.map(g => (
                            <div key={g.id} className={`ios-card p-4 option-card cursor-pointer flex items-center justify-between ${profile.goal === g.id ? 'selected' : ''}`} onClick={() => setProfile({...profile, goal: g.id})}>
                                <div>
                                    <h3 className="font-semibold text-lg">{g.label}</h3>
                                    <p className="text-sm text-gray-500">{g.desc}</p>
                                </div>
                                <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center ${profile.goal === g.id ? 'border-blue-500 bg-blue-500' : 'border-gray-300'}`}>
                                    {profile.goal === g.id && <div className="w-2.5 h-2.5 bg-white rounded-full"></div>}
                                </div>
                            </div>
                        ))}
                    </div>
                    <button className="ios-button mt-8" disabled={!profile.goal} onClick={() => setStep(3)}>Continue</button>
                </div>
            );

            const renderStep3 = () => {
                const toggleCondition = (id) => {
                    const current = profile.conditions;
                    if(current.includes(id)) setProfile({...profile, conditions: current.filter(c => c !== id)});
                    else setProfile({...profile, conditions: [...current, id]});
                };
                return (
                    <div className="max-w-md mx-auto space-y-4">
                        <div className="mb-8 text-center">
                            <h2 className="text-3xl font-bold mb-2">Health History</h2>
                            <p className="text-gray-500">Select conditions to customize nutrition and exercise.</p>
                        </div>
                        <div className="space-y-3">
                            {conditionsList.map(c => (
                                <div key={c.id} className={`ios-card p-4 option-card cursor-pointer flex items-center gap-3 ${profile.conditions.includes(c.id) ? 'selected' : ''}`} onClick={() => toggleCondition(c.id)}>
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center ${profile.conditions.includes(c.id) ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-500'}`}>
                                        <span className="text-2xl">{c.emoji}</span>
                                    </div>
                                    <h3 className="font-semibold flex-1">{c.label}</h3>
                                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center ${profile.conditions.includes(c.id) ? 'border-blue-500 bg-blue-500' : 'border-gray-300'}`}>
                                        {profile.conditions.includes(c.id) && <div className="w-2.5 h-2.5 bg-white rounded-full"></div>}
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button className="ios-button mt-8" onClick={() => setStep(4)}>Generate Plan</button>
                    </div>
                );
            }

            const renderQuickTrackSetup = () => (
                <div className="max-w-md mx-auto space-y-4 animate-fade-in">
                    <div className="mb-8 text-center">
                        <h2 className="text-3xl font-bold mb-2">Quick Tracker Setup</h2>
                        <p className="text-gray-500">Skip the clinical assessment and track calories directly.</p>
                    </div>
                    <div className="ios-card p-6 text-center">
                        <label className="block text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">Your Daily Calorie Target</label>
                        <input className="ios-input text-center text-4xl font-bold text-purple-700 h-24" type="number" placeholder="E.G. 2000" value={quickTrackerCalories} onChange={e => setQuickTrackerCalories(e.target.value)} />
                        <p className="text-xs text-gray-400 mt-4">Macros will be automatically balanced (50% Carbs, 25% Protein, 25% Fats).</p>
                    </div>
                    <button className="ios-button mt-8 !bg-purple-600" disabled={!quickTrackerCalories || quickTrackerCalories <= 0} onClick={startQuickTracker}>Open Tracker</button>
                </div>
            );

            const renderDashboard = () => {
                const isBulking = profile.goal === 'gain' || profile.goal === 'aggressive_gain';
                const isHeart = profile.conditions.includes('heart');
                const isAsthma = profile.conditions.includes('asthma');
                
                // Dynamic Weekly Schedule Generator based on Goal & Health Conditions
                let weeklySchedule = [];
                if (isHeart) {
                    weeklySchedule = [
                        { day: "Day 1", plan: "Interval Walking (IWT)", type: "cardio" },
                        { day: "Day 2", plan: "Full Rest / Recovery (Cardiac Precaution)", type: "rest" },
                        { day: "Day 3", plan: "Interval Walking (IWT)", type: "cardio" },
                        { day: "Day 4", plan: "Full Rest / Recovery", type: "rest" },
                        { day: "Day 5", plan: "Interval Walking (IWT)", type: "cardio" },
                        { day: "Day 6", plan: "Full Rest / Recovery", type: "rest" },
                        { day: "Day 7", plan: "Full Rest / Recovery", type: "rest" }
                    ];
                } else if (isAsthma) {
                    weeklySchedule = [
                        { day: "Day 1", plan: "Resistance Conditioning", type: "lift" },
                        { day: "Day 2", plan: "Active Rest (Low-intensity walk)", type: "rest" },
                        { day: "Day 3", plan: "Interval Walking (IWT)", type: "cardio" },
                        { day: "Day 4", plan: "Full Rest / Asthma Recovery", type: "rest" },
                        { day: "Day 5", plan: "Resistance Conditioning", type: "lift" },
                        { day: "Day 6", plan: "Interval Walking (IWT)", type: "cardio" },
                        { day: "Day 7", plan: "Full Rest", type: "rest" }
                    ];
                } else if (isBulking) {
                    weeklySchedule = [
                        { day: "Day 1", plan: "Heavy Resistance Conditioning", type: "lift" },
                        { day: "Day 2", plan: "Full Rest (Muscle Hypertrophy Recovery)", type: "rest" },
                        { day: "Day 3", plan: "Heavy Resistance Conditioning", type: "lift" },
                        { day: "Day 4", plan: "Interval Walking (IWT)", type: "cardio" },
                        { day: "Day 5", plan: "Heavy Resistance + Power Finishers", type: "lift" },
                        { day: "Day 6", plan: "Full Rest", type: "rest" },
                        { day: "Day 7", plan: "Active Recovery (Stretching / Yoga)", type: "rest" }
                    ];
                } else { // Weight Loss / Maintenance
                    weeklySchedule = [
                        { day: "Day 1", plan: "Resistance + Core Finishers", type: "lift" },
                        { day: "Day 2", plan: "Interval Walking (IWT)", type: "cardio" },
                        { day: "Day 3", plan: "Resistance + Core Finishers", type: "lift" },
                        { day: "Day 4", plan: "Active Rest / Light Walking", type: "rest" },
                        { day: "Day 5", plan: "Resistance + Core Finishers", type: "lift" },
                        { day: "Day 6", plan: "Interval Walking (IWT)", type: "cardio" },
                        { day: "Day 7", plan: "Full Rest", type: "rest" }
                    ];
                }
                
                return (
                    <div id="dashboard-content" className="max-w-2xl mx-auto space-y-8 pb-20">
                        
                        {/* Medical Header: Visible ONLY in Print/PDF Mode */}
                        {!quickTrackerActive && (
                        <div className="print-only print-medical-header">
                            <h1>Yozuri Philippines Project - Clinical Health Optimization Program</h1>
                            <div className="medical-grid">
                                <div><span>Patient Name:</span> {profile.firstName} {profile.lastName}</div>
                                <div><span>Date & Time:</span> {displayDateTime}</div>
                                <div><span>Age / Gender:</span> {profile.age} / {profile.gender}</div>
                                <div><span>Attending:</span> Kenneth Roy Ocampo, RN 2026</div>
                                <div><span>Weight / Height:</span> {profile.weight} kg / {profile.height} cm</div>
                                <div><span>Primary Goal:</span> {goals.find(g=>g.id===profile.goal)?.label}</div>
                                <div><span>Activity Level:</span> {activityLevels.find(a=>a.id===profile.activityLevel)?.label}</div>
                                <div><span>Target Intake:</span> {stats?.targetCalories} kcal/day</div>
                                <div className="col-span-2">
                                    <span>Reported Conditions:</span> {profile.conditions.length > 0 ? profile.conditions.map(c => conditionsList.find(l=>l.id===c).label).join(', ') : 'None Reported'}
                                </div>
                            </div>
                        </div>
                        )}

                        {/* Titles */}
                        {!quickTrackerActive ? (
                            <div className="text-center mb-8 no-print">
                                <h2 className="text-3xl font-bold">Clinical Optimization Plan</h2>
                                <p className="text-gray-500 text-lg">Prepared for {profile.firstName} {profile.lastName}</p>
                            </div>
                        ) : (
                            <div className="text-center mb-8 no-print">
                                <h2 className="text-3xl font-bold text-purple-700">Quick Calorie Tracker</h2>
                                <p className="text-gray-500 text-lg">Daily Target: {stats?.targetCalories} kcal</p>
                            </div>
                        )}

                        {/* Bioenergetics - ON SCREEN VIEW */}
                        {!quickTrackerActive && (
                        <div className="ios-card p-6 no-print">
                            <h3 className="font-semibold text-lg text-blue-600 mb-4 flex items-center gap-2">
                                ⚙️ Bioenergetics & Macros
                            </h3>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                                <div className="bg-gray-50 p-4 rounded-xl text-center">
                                    <p className="text-xs text-gray-500 font-medium uppercase">BMI</p>
                                    <p className="text-2xl font-bold">{stats.bmi}</p>
                                    <p className="text-xs font-medium text-blue-500">{stats.bmiCategory}</p>
                                </div>
                                <div className="bg-gray-50 p-4 rounded-xl text-center">
                                    <p className="text-xs text-gray-500 font-medium uppercase">BMR</p>
                                    <p className="text-2xl font-bold">{stats.bmr}</p>
                                    <p className="text-xs font-medium">kcal/day</p>
                                </div>
                                <div className="bg-gray-50 p-4 rounded-xl text-center">
                                    <p className="text-xs text-gray-500 font-medium uppercase">TDEE</p>
                                    <p className="text-2xl font-bold">{stats.tdee}</p>
                                    <p className="text-xs font-medium">kcal/day</p>
                                </div>
                                <div className="bg-blue-50 p-4 rounded-xl text-center border border-blue-100">
                                    <p className="text-xs text-blue-600 font-bold uppercase">Target Intake</p>
                                    <p className="text-3xl font-bold text-blue-700">{stats.targetCalories}</p>
                                    <p className="text-xs font-medium text-blue-600">kcal/day</p>
                                </div>
                            </div>
                            <div className="grid grid-cols-3 gap-4">
                                <div className="text-center p-3 border-t border-gray-100">
                                    <p className="text-sm text-gray-500 font-medium mb-1">Carbs</p>
                                    <p className="text-xl font-bold text-amber-500">{stats.macros.carbs}g</p>
                                </div>
                                <div className="text-center p-3 border-t border-gray-100">
                                    <p className="text-sm text-gray-500 font-medium mb-1">Protein</p>
                                    <p className="text-xl font-bold text-red-500">{stats.macros.protein}g</p>
                                </div>
                                <div className="text-center p-3 border-t border-gray-100">
                                    <p className="text-sm text-gray-500 font-medium mb-1">Fats</p>
                                    <p className="text-xl font-bold text-teal-500">{stats.macros.fat}g</p>
                                </div>
                            </div>
                        </div>
                        )}

                        {/* COMPACT MACROS WITH BIGGER FONTS (FOR PRINT PDF ONLY) */}
                        {!quickTrackerActive && (
                        <div className="print-only mb-2">
                            <h3 className="font-semibold text-[10pt] text-black border-b border-gray-200 pb-1 mb-2">⚙️ Metabolic Baseline & Daily Targets</h3>
                            
                            <div className="professional-print-stats">
                                <div className="stat-box">
                                    <div className="stat-title">BMI</div>
                                    <div className="stat-value">{stats.bmi} <span>({stats.bmiCategory})</span></div>
                                </div>
                                <div className="stat-box">
                                    <div className="stat-title">BMR</div>
                                    <div className="stat-value">{stats.bmr} <span>kcal/day</span></div>
                                </div>
                                <div className="stat-box">
                                    <div className="stat-title">TDEE</div>
                                    <div className="stat-value">{stats.tdee} <span>kcal/day</span></div>
                                </div>
                                <div className="stat-box" style={{backgroundColor: '#f0f8ff', borderColor: '#0056b3'}}>
                                    <div className="stat-title">Target Intake</div>
                                    <div className="stat-value">{stats.targetCalories} <span>kcal/day</span></div>
                                </div>
                            </div>

                            <div className="professional-print-macros">
                                <div className="macro-box">
                                    <span className="macro-title">Carbs: </span><span className="macro-value">{stats.macros.carbs}g</span>
                                </div>
                                <div className="macro-box">
                                    <span className="macro-title">Protein: </span><span className="macro-value">{stats.macros.protein}g</span>
                                </div>
                                <div className="macro-box">
                                    <span className="macro-title">Fats: </span><span className="macro-value">{stats.macros.fat}g</span>
                                </div>
                            </div>
                        </div>
                        )}

                        {/* Health Guidelines */}
                        {!quickTrackerActive && (
                        <div className="ios-card p-6 !mt-2">
                            <h3 className="font-semibold text-lg text-red-500 mb-4 flex items-center gap-2">
                                ⚕️ Clinical Health Teaching & Dietary Interventions
                            </h3>
                            <ul className="space-y-4 text-gray-800">
                                {profile.conditions.includes('htn') && (
                                    <li className="flex gap-3"><div className="mt-1 w-2 h-2 rounded-full bg-red-500 shrink-0"></div>
                                    <div><span className="font-semibold text-red-700">Hypertension Management:</span> Follow the DASH (Dietary Approaches to Stop Hypertension) principles. <strong>Actionable step:</strong> Strictly limit daily sodium intake to less than 1,500mg. Avoid common high-sodium Filipino condiments like patis, bagoong, and soy sauce. Increase potassium intake to help blood vessels relax by consuming more Kangkong, Spinach, and Mongo. Monitor blood pressure daily.</div></li>
                                )}
                                {profile.conditions.includes('dm') && (
                                    <li className="flex gap-3"><div className="mt-1 w-2 h-2 rounded-full bg-red-500 shrink-0"></div>
                                    <div><span className="font-semibold text-red-700">Type 2 Diabetes Control:</span> Focus on mitigating blood sugar spikes. <strong>Actionable step:</strong> Prioritize low Glycemic Index (GI) carbohydrates like brown rice over white rice. Completely eliminate 3-in-1 coffee sachets and sugary beverages. Incorporate Ampalaya (bitter gourd) into meals regularly, as it possesses clinically proven insulin-mimetic properties that assist in glucose regulation.</div></li>
                                )}
                                {profile.conditions.includes('pcos') && (
                                    <li className="flex gap-3"><div className="mt-1 w-2 h-2 rounded-full bg-red-500 shrink-0"></div>
                                    <div><span className="font-semibold text-red-700">PCOS Optimization:</span> PCOS is heavily driven by underlying insulin resistance. <strong>Actionable step:</strong> Maintain a high-protein diet to manage insulin spikes and increase satiety. Increase dietary Omega-3 fatty acids by frequently consuming local fish like Bangus and Tilapia to lower systemic inflammation, which directly helps in reducing excess androgen production.</div></li>
                                )}
                                {profile.conditions.includes('cholesterol') && (
                                    <li className="flex gap-3"><div className="mt-1 w-2 h-2 rounded-full bg-red-500 shrink-0"></div>
                                    <div><span className="font-semibold text-red-700">Cholesterol Reduction:</span> Aim to lower LDL (bad) cholesterol. <strong>Actionable step:</strong> Drastically minimize saturated fats found in fatty pork cuts (liempo) and avoid dishes heavily cooked in coconut oil. Increase soluble fiber intake significantly; incorporate Okra and Mongo into stews, as soluble fiber acts as a gel in the digestive tract to trap and eliminate excess cholesterol.</div></li>
                                )}
                                {profile.conditions.includes('uric') && (
                                    <li className="flex gap-3"><div className="mt-1 w-2 h-2 rounded-full bg-red-500 shrink-0"></div>
                                    <div><span className="font-semibold text-red-700">Hyperuricemia (Gout) Care:</span> Prevent painful gout flare-ups by lowering purine intake. <strong>Actionable step:</strong> Adopt a strict low-purine diet. Avoid all internal organ meats (atay, bato, isaw) and specific purine-rich seafoods like canned sardines and anchovies. Hydrate excessively with water and include low-fat dairy, which has been shown to assist the kidneys in excreting uric acid.</div></li>
                                )}
                                {profile.conditions.length === 0 && (
                                    <li className="flex gap-3"><div className="mt-1 w-2 h-2 rounded-full bg-green-500 shrink-0"></div>
                                    <div><span className="font-semibold text-green-700">General Health Maintenance:</span> Maintain metabolic flexibility. <strong>Actionable step:</strong> Utilize the balanced plate method for every meal—fill half your plate with non-starchy vegetables, one-quarter with complex carbohydrates, and one-quarter with a lean protein source. Ensure adequate daily hydration (min 2L/day).</div></li>
                                )}
                            </ul>
                        </div>
                        )}

                        {/* Exercise Plan */}
                        {!quickTrackerActive && (
                        <div id="exercise-plan-container" className="ios-card p-6 !mt-2 bg-white relative">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="font-semibold text-lg text-emerald-500 flex items-center gap-2">
                                    💪 Prescribed Exercise Regimen
                                </h3>
                                <button id="save-img-btn" onClick={handleSaveExerciseImage} disabled={isSavingImage} className="bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-emerald-100 transition flex items-center gap-1.5 no-print disabled:opacity-50 border border-emerald-200">
                                    <i className="lucide-image w-4 h-4"></i> {isSavingImage ? 'Saving...' : 'Save Image'}
                                </button>
                            </div>
                            
                            {(profile.conditions.includes('heart') || profile.conditions.includes('asthma')) && (
                                <div className="bg-amber-50 text-amber-800 p-3 rounded-xl mb-3 text-sm font-medium">
                                    ⚠️ Medical Clearance Required. Stop immediately if experiencing chest pain. Ensure inhaler is present if asthmatic.
                                </div>
                            )}

                            {/* Weekly Schedule Planner */}
                            <div className="mb-6">
                                <h4 className="font-bold text-sm text-gray-800 mb-3 border-b border-gray-100 pb-2">📅 Weekly Schedule</h4>
                                <div className="space-y-2">
                                    {weeklySchedule.map((day, i) => (
                                        <div key={i} className="flex items-center p-2.5 rounded-lg bg-gray-50 border border-gray-100">
                                            <span className="font-bold text-xs text-gray-800 w-14 shrink-0 uppercase">{day.day}</span>
                                            <span className={`text-sm font-semibold flex-1 ${day.type === 'rest' ? 'text-gray-500' : day.type === 'cardio' ? 'text-blue-600' : 'text-emerald-600'}`}>
                                                {day.plan}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="mb-4">
                                <h4 className="font-bold mb-1">1. Japanese Interval Walking Training (IWT)</h4>
                                <div className="iwt-block flex flex-col gap-4 bg-gray-50 p-4 rounded-xl border border-gray-200">
                                    <div className="flex justify-center items-center no-print w-full bg-white p-2 rounded-xl shadow-sm border border-gray-100">
                                        <img src={appImages.intervalWalking} alt="Interval Walking" className="w-full max-h-48 object-contain rounded-lg" />
                                    </div>
                                    <div className="flex-1 flex flex-col justify-center">
                                        <p className="font-semibold text-sm">The 3x3 Protocol (30 Mins Total)</p>
                                        <ul className="text-sm text-gray-600 mt-1 list-disc pl-4">
                                            <li><strong>3 Minutes Brisk:</strong> Walk at 70-80% effort (heavy breathing).</li>
                                            <li><strong>3 Minutes Slow:</strong> Recovery pace, conversational.</li>
                                            <li>Repeat 5 times total. Perform 4x a week.</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>

                            {!profile.conditions.includes('heart') && (
                                <div>
                                    <h4 className="font-bold mb-1">2. Low-Budget Resistance Conditioning {isBulking && "(Hypertrophy Focus)"}</h4>
                                    <div className="exercise-grid grid grid-cols-2 gap-4">
                                        
                                        <div className="border border-gray-200 p-4 rounded-xl flex flex-col items-center text-center bg-gray-50">
                                            <div className="h-32 flex flex-col items-center justify-center no-print w-full mb-2 bg-white rounded-lg overflow-hidden border border-gray-100 relative">
                                                <img src={isBulking ? appImages.squatHeavy : appImages.squatBW} alt="Squats" className="h-full w-full object-cover" />
                                            </div>
                                            <div className="text-sm font-bold">{isBulking ? "Bulgarian Split Squat" : "Air Squats"}</div>
                                            <div className="text-xs text-gray-500 mt-1 mb-2">3 sets of {isBulking ? "8-12 / leg" : "15-20"}</div>
                                        </div>
                                        
                                        <div className="border border-gray-200 p-4 rounded-xl flex flex-col items-center text-center bg-gray-50">
                                            <div className="h-32 flex flex-col items-center justify-center no-print w-full mb-2 bg-white rounded-lg overflow-hidden border border-gray-100 relative">
                                                <img src={isBulking ? appImages.pushupDecline : appImages.pushupBW} alt="Pushups" className="h-full w-full object-cover" />
                                            </div>
                                            <div className="text-sm font-bold">{isBulking ? "Feet-Elevated Push-ups" : "Standard Push-ups"}</div>
                                            <div className="text-xs text-gray-500 mt-1 mb-2">3 sets to failure</div>
                                        </div>
                                        
                                        <div className="border border-gray-200 p-4 rounded-xl flex flex-col items-center text-center bg-gray-50">
                                            <div className="h-32 flex flex-col items-center justify-center no-print w-full mb-2 bg-white rounded-lg overflow-hidden border border-gray-100 relative">
                                                <img src={isBulking ? appImages.rowTable : appImages.rowBW} alt="Rows" className="h-full w-full object-cover" />
                                            </div>
                                            <div className="text-sm font-bold">{isBulking ? "Table Inverted Row" : "Doorway Rows"}</div>
                                            <div className="text-xs text-gray-500 mt-1 mb-2">3 sets of {isBulking ? "8-10" : "15 reps"}</div>
                                        </div>
                                        
                                        <div className="border border-gray-200 p-4 rounded-xl flex flex-col items-center text-center bg-gray-50">
                                            <div className="h-32 flex flex-col items-center justify-center no-print w-full mb-2 bg-white rounded-lg overflow-hidden border border-gray-100 relative">
                                                <img src={isBulking ? appImages.plankReachUnder : appImages.plankVariations} alt="Plank" className="h-full w-full object-cover" />
                                            </div>
                                            <div className="text-sm font-bold">{isBulking ? "Plank Reach-Unders" : "Plank Variations"}</div>
                                            <div className="text-xs text-gray-500 mt-1 mb-2">3 sets of 30-60s</div>
                                        </div>
                                    </div>

                                    <h4 className="font-bold mb-1 mt-4">3. Power & Core Finishers</h4>
                                    <div className="exercise-grid grid grid-cols-2 gap-4">
                                        <div className="border border-gray-200 p-4 rounded-xl flex flex-col items-center text-center bg-gray-50">
                                            <div className="h-32 flex flex-col items-center justify-center no-print w-full mb-2 bg-white rounded-lg overflow-hidden border border-gray-100 relative">
                                                <img src={isBulking ? appImages.suitcaseDeadlift : appImages.burpees} alt="Finisher 1" className="h-full w-full object-cover" />
                                            </div>
                                            <div className="text-sm font-bold">{isBulking ? "Suitcase Deadlifts" : "Burpees"}</div>
                                            <div className="text-xs text-gray-500 mt-1 mb-2">{isBulking ? "3 sets of 10 / side" : "3 sets of 15"}</div>
                                        </div>
                                        
                                        <div className="border border-gray-200 p-4 rounded-xl flex flex-col items-center text-center bg-gray-50">
                                            <div className="h-32 flex flex-col items-center justify-center no-print w-full mb-2 bg-white rounded-lg overflow-hidden border border-gray-100 relative">
                                                <img src={isBulking ? appImages.pullup : appImages.mountainClimbers} alt="Finisher 2" className="h-full w-full object-cover" />
                                            </div>
                                            <div className="text-sm font-bold">{isBulking ? "Pull-ups" : "Mountain Climbers"}</div>
                                            <div className="text-xs text-gray-500 mt-1 mb-2">{isBulking ? "3 sets to failure" : "3 sets of 45 seconds"}</div>
                                        </div>

                                        <div className="border border-gray-200 p-4 rounded-xl flex flex-col items-center text-center bg-gray-50">
                                            <div className="h-32 flex flex-col items-center justify-center no-print w-full mb-2 bg-white rounded-lg overflow-hidden border border-gray-100 relative">
                                                <img src={isBulking ? appImages.backpackPushup : appImages.lateralLunge} alt="Finisher 3" className="h-full w-full object-cover" />
                                            </div>
                                            <div className="text-sm font-bold">{isBulking ? "Backpack Push-ups" : "Lateral Lunges"}</div>
                                            <div className="text-xs text-gray-500 mt-1 mb-2">{isBulking ? "3 sets of 8-12" : "3 sets of 12 / leg"}</div>
                                        </div>

                                        <div className="border border-gray-200 p-4 rounded-xl flex flex-col items-center text-center bg-gray-50">
                                            <div className="h-32 flex flex-col items-center justify-center no-print w-full mb-2 bg-white rounded-lg overflow-hidden border border-gray-100 relative">
                                                <img src={isBulking ? appImages.pistolSquat : appImages.jumpSquat} alt="Finisher 4" className="h-full w-full object-cover" />
                                            </div>
                                            <div className="text-sm font-bold">{isBulking ? "Pistol Squats" : "Jump Squats"}</div>
                                            <div className="text-xs text-gray-500 mt-1 mb-2">{isBulking ? "3 sets of 5 / leg" : "3 sets of 15"}</div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                        )}

                        {/* Food Tracker Engine - Always shows, but hidden entirely on Print to save space */}
                        <div className="ios-card p-6 no-print">
                            <h3 className="font-semibold text-lg text-purple-600 mb-4 flex items-center gap-2">
                                🍽️ Automated Daily Intake Tracker
                            </h3>
                            
                            <div className="bg-gray-50 rounded-xl p-4 mb-6 border border-gray-200">
                                <div className="flex justify-between items-end mb-2">
                                    <span className="font-semibold text-sm">Calories Remaining</span>
                                    <span className="text-3xl font-bold text-purple-700">{Math.max(0, stats.targetCalories - consumed.cals)}</span>
                                </div>
                                <div className="w-full bg-gray-200 rounded-full h-3 mb-1">
                                    <div className="bg-purple-500 h-3 rounded-full transition-all" style={{width: `${Math.min(100, (consumed.cals/stats.targetCalories)*100)}%`}}></div>
                                </div>
                                <div className="flex justify-between text-xs text-gray-500 mt-2 font-medium">
                                    <span>Carbs: <span className="text-amber-600">{Math.round(consumed.carbs)} / {stats.macros.carbs}g</span></span>
                                    <span>Pro: <span className="text-red-600">{Math.round(consumed.protein)} / {stats.macros.protein}g</span></span>
                                    <span>Fat: <span className="text-teal-600">{Math.round(consumed.fat)} / {stats.macros.fat}g</span></span>
                                </div>
                            </div>

                            {/* Option 1: Database Add */}
                            <div className="bg-white border border-gray-200 rounded-xl p-4 mb-4">
                                <h4 className="font-bold text-sm text-purple-700 mb-1">Option 1: Food Database</h4>
                                <p className="text-xs text-gray-500 mb-3">Select a food to auto-calculate locked macros.</p>
                                <div className="flex gap-2 mb-3">
                                    <input list="food-db" className="ios-input !p-2 text-sm flex-1" placeholder="SEARCH DATABASE..." value={newFood.name} onChange={e => recalculateFromDb(e.target.value, newFood.amount, newFood.unit)}/>
                                    <datalist id="food-db">
                                        {Object.keys(foodDatabase).map(f => <option key={f} value={f} />)}
                                    </datalist>
                                    
                                    <input className="ios-input !p-2 text-sm w-16" type="number" placeholder="AMT" value={newFood.amount} onChange={e => recalculateFromDb(newFood.name, e.target.value, newFood.unit)}/>
                                    <select className="ios-input !p-2 text-sm w-20 bg-gray-50 text-gray-500" value={newFood.unit} disabled>
                                        <option value="g">G</option>
                                        <option value="cup">CUP</option>
                                        <option value="pc">PC</option>
                                    </select>
                                </div>
                                <div className="flex gap-2 items-center bg-gray-50 p-2 rounded-lg">
                                    {/* Macros are now Read-Only UI elements */}
                                    <div className="ios-input !p-2 text-sm w-full bg-gray-100 text-gray-500 text-center select-none">C: {newFood.carbs || 0}g</div>
                                    <div className="ios-input !p-2 text-sm w-full bg-gray-100 text-gray-500 text-center select-none">P: {newFood.protein || 0}g</div>
                                    <div className="ios-input !p-2 text-sm w-full bg-gray-100 text-gray-500 text-center select-none">F: {newFood.fat || 0}g</div>
                                    <div className="text-sm font-bold w-full text-center text-purple-700">{newFood.calories || 0} kcal</div>
                                    <button className="bg-purple-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-purple-600 transition disabled:opacity-50" disabled={!newFood.calories} onClick={logDatabaseFood}>+</button>
                                </div>
                            </div>

                            {/* Option 2: Quick Add Calories */}
                            <div className="bg-white border border-gray-200 rounded-xl p-4 mb-6">
                                <h4 className="font-bold text-sm text-blue-600 mb-1">Option 2: Quick Add Calories</h4>
                                <p className="text-xs text-gray-500 mb-3">Add unlisted foods. Macros will not be tracked, only calories.</p>
                                <div className="flex gap-2">
                                    <input className="ios-input !p-2 text-sm flex-1" placeholder="CUSTOM FOOD NAME..." value={quickFood.name} onChange={e => setQuickFood({...quickFood, name: e.target.value.toUpperCase()})} />
                                    <input className="ios-input !p-2 text-sm w-24" type="number" placeholder="TOTAL KCAL" value={quickFood.calories} onChange={e => setQuickFood({...quickFood, calories: e.target.value})} />
                                    <button className="bg-blue-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-600 transition disabled:opacity-50" disabled={!quickFood.name || !quickFood.calories} onClick={logQuickFood}>+</button>
                                </div>
                            </div>

                            {/* Log Display */}
                            <div className="space-y-2">
                                {foodLog.map(f => (
                                    <div key={f.id} className="flex justify-between items-center p-3 bg-white border border-gray-100 rounded-lg text-sm shadow-sm">
                                        <div>
                                            <p className="font-semibold">{f.name}</p>
                                            <p className="text-xs text-gray-500">
                                                {f.desc} {f.desc !== 'Quick Add' ? `• ${f.carbs}C • ${f.protein}P • ${f.fat}F` : ''}
                                            </p>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <span className="font-bold">{f.calories} kcal</span>
                                            <button onClick={() => removeFood(f.id)} className="text-red-400 hover:text-red-600 transition">🗑️</button>
                                        </div>
                                    </div>
                                ))}
                                {foodLog.length === 0 && <p className="text-center text-gray-400 text-sm py-4">No foods logged today.</p>}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen">
                    {step > 0 && renderHeader()}
                    <div className={step > 0 ? "px-6" : ""}>
                        {step === 0 && renderIntro()}
                        {step === 0.5 && renderDisclaimer()}
                        {step === 1 && renderStep1()}
                        {step === 2 && renderStep2()}
                        {step === 3 && renderStep3()}
                        {step === 4 && renderDashboard()}
                        {step === 5 && renderQuickTrackSetup()}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
